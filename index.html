<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Whoosh — Барабан бонусов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --whoosh-bg: #F2F2F2;
      --whoosh-surface: #FFFFFF;
      --whoosh-accent: #FFD500;
      --whoosh-line: #E8E8E8;
      --whoosh-text: #000000;
      --whoosh-muted: #666666;
      --whoosh-radius-btn: 12px;
      --whoosh-radius-modal: 16px;
      --drum-item-h: 76px;
      --drum-view-h: calc(var(--drum-item-h) * 3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100dvh;
    }

    html, body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--whoosh-bg);
      color: var(--whoosh-text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      padding: max(10px, env(safe-area-inset-top, 0px)) 16px max(10px, env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      box-sizing: border-box;
      min-height: 100dvh;
      width: 100%;
      overflow-y: hidden;
    }

    .app {
      width: 100%;
      max-width: 520px;
      min-height: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    header {
      text-align: center;
      width: 100%;
      padding: 0 6px;
      flex-shrink: 0;
    }

    .brand-wordmark {
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.45em;
      color: #000000;
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(0.85rem, 3.8vw, 1.1rem);
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1.35;
      color: #000000;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--whoosh-muted);
      line-height: 1.45;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    .main-stack {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 0;
      width: 100%;
      padding: 8px 0 4px;
    }

    .drum-assembly {
      position: relative;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: min(100%, 380px);
      flex-shrink: 0;
    }

    .drum-viewport {
      position: relative;
      flex: 1;
      min-width: 0;
      height: var(--drum-view-h);
      overflow: hidden;
      background: var(--whoosh-surface);
      border-radius: 12px;
      border: 2px solid #000000;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.06);
    }

    .drum-fade {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 2;
      pointer-events: none;
      height: 38%;
    }

    .drum-fade--top {
      top: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.14) 0%, rgba(0, 0, 0, 0) 100%);
    }

    .drum-fade--bottom {
      bottom: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.14) 0%, rgba(0, 0, 0, 0) 100%);
    }

    .drum-strip-wrap {
      position: relative;
      z-index: 0;
    }

    .drum-strip {
      will-change: transform;
    }

    .drum-card {
      height: var(--drum-item-h);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--whoosh-line);
      background: var(--whoosh-surface);
    }

    .drum-card__icon {
      width: 48px;
      height: 48px;
      background: var(--whoosh-accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .drum-card__text {
      flex: 1;
      min-width: 0;
      text-align: left;
    }

    .drum-card__big {
      font-size: 1.2rem;
      font-weight: 800;
      color: #000000;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .drum-card__small {
      margin-top: 2px;
      font-size: 0.68rem;
      font-weight: 600;
      color: #444444;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .drum-pointer {
      flex-shrink: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 14px 0 14px 18px;
      border-color: transparent transparent transparent #000000;
      margin-left: 2px;
      filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.15));
    }

    @media (max-height: 700px) {
      :root {
        --drum-item-h: 70px;
      }
      .brand-wordmark {
        margin-bottom: 6px;
      }
      .subtitle {
        margin-top: 4px;
        font-size: 0.68rem;
      }
      .main-stack {
        gap: 10px;
        padding: 4px 0 2px;
      }
      .btn-spin {
        padding: 20px 22px;
        font-size: 0.82rem;
      }
    }

    @media (max-height: 620px) {
      :root {
        --drum-item-h: 64px;
      }
      h1 {
        font-size: clamp(0.78rem, 3.5vw, 1rem);
      }
    }

    .btn-spin {
      width: 100%;
      max-width: 520px;
      padding: 26px 28px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--whoosh-radius-btn);
      cursor: pointer;
      color: #000000;
      background: var(--whoosh-accent);
      transition: opacity 0.15s ease;
    }

    .btn-spin:active:not(:disabled) {
      opacity: 0.88;
    }

    .btn-spin.is-waiting {
      opacity: 0.75;
    }

    .btn-spin:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .played-msg {
      width: 100%;
      max-width: 520px;
      padding: 22px 20px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      line-height: 1.5;
      color: var(--whoosh-muted);
      background: var(--whoosh-surface);
      border: 1px solid var(--whoosh-line);
      border-radius: var(--whoosh-radius-btn);
    }

    .staff-hint {
      font-size: clamp(11px, 3.2vw, 13px);
      font-weight: 500;
      color: var(--whoosh-muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      line-height: 1.45;
      max-width: 320px;
      margin: 0;
      padding: 0 10px;
      flex-shrink: 0;
    }

    .modal .staff-hint {
      margin: 0 auto 14px;
      padding: 0 12px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) 20px max(16px, env(safe-area-inset-bottom));
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: 100%;
      max-width: 336px;
      max-height: calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      overflow-y: auto;
      background: var(--whoosh-surface);
      color: #000000;
      border-radius: var(--whoosh-radius-modal);
      padding: 28px 22px 22px;
      border: 1px solid var(--whoosh-line);
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .overlay.is-open .modal {
      opacity: 1;
    }

    .modal-accent {
      width: calc(100% + 44px);
      height: 3px;
      background: var(--whoosh-accent);
      margin: -28px -22px 18px;
    }

    .modal h2 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 14px;
      color: #000000;
    }

    .modal-prize {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #000000;
      margin-bottom: 24px;
      line-height: 1.4;
      min-height: 2.3em;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-claim {
      padding: 18px 18px;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid #000000;
      border-radius: var(--whoosh-radius-btn);
      cursor: pointer;
      color: #ffffff;
      background: #000000;
      transition: opacity 0.15s;
    }

    .btn-claim:active:not(:disabled) {
      opacity: 0.85;
    }

    .btn-claim:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      padding: 14px;
      font-family: inherit;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: 1px solid var(--whoosh-line);
      border-radius: var(--whoosh-radius-btn);
      cursor: pointer;
      background: var(--whoosh-surface);
      color: var(--whoosh-muted);
    }

    .app--played .drum-assembly {
      opacity: 0.55;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <p class="brand-wordmark">WHOOSH</p>
      <h1>БОНУСЫ ОТ WHOOSH</h1>
      <p class="subtitle">Крути барабан и забирай приз</p>
    </header>

    <div class="main-stack">
      <div class="drum-assembly" id="drumAssembly" aria-hidden="true">
        <div class="drum-viewport" id="drumViewport">
          <div class="drum-fade drum-fade--top" aria-hidden="true"></div>
          <div class="drum-fade drum-fade--bottom" aria-hidden="true"></div>
          <div class="drum-strip-wrap">
            <div class="drum-strip" id="drumStrip"></div>
          </div>
        </div>
        <div class="drum-pointer" aria-hidden="true"></div>
      </div>

      <p class="staff-hint">Один аккаунт — одна попытка. Покажите экран сотруднику.</p>

      <button type="button" class="btn-spin" id="spinBtn">КРУТИТЬ</button>
      <p class="played-msg" id="playedMsg" hidden>Вы уже использовали свой шанс. Возвращайтесь завтра!</p>
    </div>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-accent" aria-hidden="true"></div>
      <p class="staff-hint">Один аккаунт — одна попытка. Покажите экран сотруднику.</p>
      <h2 id="modalTitle">Поздравляем</h2>
      <p class="modal-prize" id="modalPrize"></p>
      <div class="modal-actions">
        <button type="button" class="btn-claim" id="claimBtn">Забрать приз</button>
        <button type="button" class="btn-secondary" id="closeModalBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const LS_PLAYED = "whoosh_played";

    /**
     * Призы и вероятности (сумма весов = 100).
     * Выбор: случайное число r в [0, 100), приз с наименьшим cum > r по накопленным весам.
     */
    const PRIZE_POOL = [
      { title: "iPhone 16", big: "16", small: "iPhone", icon: "\u{1F4F1}", weight: 0.1 },
      { title: "Неделя поездок", big: "7", small: "дней поездок", icon: "\u{1F6F4}", weight: 1 },
      { title: "Whoosh Pass на месяц", big: "Pass", small: "30 дней", icon: "\u{1F3AB}", weight: 5 },
      { title: "500 бонусов", big: "500", small: "бонусов", icon: "\u{1F4B0}", weight: 10 },
      { title: "Бесплатный старт (3 шт)", big: "3", small: "бесплатных старта", icon: "\u26A1", weight: 25 },
      { title: "Скидка 20%", big: "20%", small: "скидка", icon: "\u{1F3F7}", weight: 25 },
      { title: "100 бонусов", big: "100", small: "бонусов", icon: "\u2728", weight: 33.9 },
    ];

    function pickWeightedPrize() {
      const r = Math.random() * 100;
      let cum = 0;
      for (let i = 0; i < PRIZE_POOL.length; i++) {
        cum += PRIZE_POOL[i].weight;
        if (r < cum) {
          return PRIZE_POOL[i];
        }
      }
      return PRIZE_POOL[PRIZE_POOL.length - 1];
    }

    function randomPoolEntry() {
      return PRIZE_POOL[Math.floor(Math.random() * PRIZE_POOL.length)];
    }

    function cloneEntry(entry) {
      return {
        title: entry.title,
        big: entry.big,
        small: entry.small,
        icon: entry.icon,
      };
    }

    function renderStripRow(entry) {
      const row = document.createElement("div");
      row.className = "drum-card";
      row.innerHTML =
        '<div class="drum-card__icon" aria-hidden="true"></div>' +
        '<div class="drum-card__text">' +
        '<div class="drum-card__big"></div>' +
        '<div class="drum-card__small"></div>' +
        "</div>";
      row.querySelector(".drum-card__icon").textContent = entry.icon;
      row.querySelector(".drum-card__big").textContent = entry.big;
      row.querySelector(".drum-card__small").textContent = entry.small;
      row.dataset.prizeTitle = entry.title;
      return row;
    }

    function buildStrip(winnerEntry) {
      const preCount = 32 + Math.floor(Math.random() * 10);
      const strip = [];
      for (let i = 0; i < preCount; i++) {
        strip.push(cloneEntry(randomPoolEntry()));
      }
      strip.push(cloneEntry(winnerEntry));
      return strip;
    }

    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const spinSound = new Audio("wheel-of-fortune.mp3");
    spinSound.preload = "auto";
    let spinRafId = null;
    let spinTimeoutId = null;

    function cancelSpinAnimation() {
      if (spinTimeoutId !== null) {
        clearTimeout(spinTimeoutId);
        spinTimeoutId = null;
      }
      if (spinRafId !== null) {
        cancelAnimationFrame(spinRafId);
        spinRafId = null;
      }
    }

    function easeCubicBezier(t, x1, y1, x2, y2) {
      if (t <= 0) return 0;
      if (t >= 1) return 1;
      let lo = 0;
      let hi = 1;
      for (let i = 0; i < 28; i++) {
        const u = (lo + hi) / 2;
        const bx =
          3 * (1 - u) * (1 - u) * u * x1 +
          3 * (1 - u) * u * u * x2 +
          u * u * u;
        if (bx < t) lo = u;
        else hi = u;
      }
      const u = (lo + hi) / 2;
      return (
        3 * (1 - u) * (1 - u) * u * y1 +
        3 * (1 - u) * u * u * y2 +
        u * u * u
      );
    }

    const easeSpin = function (t) {
      return easeCubicBezier(t, 0.2, 0, 0.3, 1);
    };

    function showErr(msg) {
      if (tg && typeof tg.showAlert === "function") {
        tg.showAlert(msg);
      } else {
        alert(msg);
      }
    }

    const drumStrip = document.getElementById("drumStrip");
    const drumViewport = document.getElementById("drumViewport");
    const spinBtn = document.getElementById("spinBtn");
    const playedMsg = document.getElementById("playedMsg");
    const appEl = document.getElementById("app");
    const overlay = document.getElementById("overlay");
    const modalPrize = document.getElementById("modalPrize");
    const claimBtn = document.getElementById("claimBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    let itemHeightPx = 76;
    let currentPrizeText = "";
    let spinning = false;

    function readItemHeight() {
      const v = getComputedStyle(document.documentElement).getPropertyValue("--drum-item-h").trim();
      const parsed = parseFloat(v);
      return Number.isFinite(parsed) ? parsed : 76;
    }

    function translateForCenteredIndex(index, viewH) {
      return viewH / 2 - itemHeightPx / 2 - index * itemHeightPx;
    }

    function applyStripTransform(y) {
      drumStrip.style.transform = "translateY(" + y + "px)";
    }

    function fillStripFromData(entries) {
      drumStrip.innerHTML = "";
      for (let i = 0; i < entries.length; i++) {
        drumStrip.appendChild(renderStripRow(entries[i]));
      }
    }

    function spin() {
      if (spinning) return;
      cancelSpinAnimation();

      itemHeightPx = readItemHeight();
      const viewH = drumViewport.getBoundingClientRect().height;

      const won = pickWeightedPrize();
      const stripData = buildStrip(won);
      fillStripFromData(stripData);

      const winIndex = stripData.length - 1;
      const yStart = translateForCenteredIndex(0, viewH);
      const yEnd = translateForCenteredIndex(winIndex, viewH);

      applyStripTransform(yStart);

      spinSound.pause();
      spinSound.currentTime = 0;
      spinSound.volume = 1;
      spinSound.play().catch(function () {});

      spinBtn.classList.add("is-waiting");
      spinBtn.disabled = true;
      spinning = true;

      const SPIN_MS = 4500;
      const startTime = performance.now();

      function frame(now) {
        const elapsed = now - startTime;
        const t = Math.min(1, elapsed / SPIN_MS);
        const e = easeSpin(t);
        const y = yStart + (yEnd - yStart) * e;
        applyStripTransform(y);
        if (t < 1) {
          spinRafId = requestAnimationFrame(frame);
        } else {
          spinRafId = null;
          applyStripTransform(yEnd);
        }
      }
      spinRafId = requestAnimationFrame(frame);

      spinTimeoutId = setTimeout(function () {
        spinTimeoutId = null;
        if (spinRafId !== null) {
          cancelAnimationFrame(spinRafId);
          spinRafId = null;
        }
        applyStripTransform(yEnd);
        spinSound.pause();
        spinSound.currentTime = 0;
        currentPrizeText = won.title;
        spinning = false;
        spinBtn.disabled = false;
        spinBtn.classList.remove("is-waiting");
        openModal(currentPrizeText);
      }, SPIN_MS);
    }

    function openModal(prize) {
      modalPrize.textContent = prize;
      claimBtn.textContent = "Забрать приз";
      claimBtn.disabled = false;
      overlay.classList.add("is-open");
    }

    function closeModal() {
      overlay.classList.remove("is-open");
    }

    function applyPlayedState() {
      appEl.classList.add("app--played");
      spinBtn.hidden = true;
      playedMsg.hidden = false;
    }

    function initPlayedGate() {
      try {
        if (localStorage.getItem(LS_PLAYED) === "true") {
          applyPlayedState();
        }
      } catch (e) {
        /* ignore */
      }
    }

    spinBtn.addEventListener("click", spin);
    closeModalBtn.addEventListener("click", closeModal);

    claimBtn.addEventListener("click", async function () {
      if (claimBtn.disabled) return;

      const prize = currentPrizeText;
      const user =
        window.Telegram &&
        window.Telegram.WebApp &&
        window.Telegram.WebApp.initDataUnsafe
          ? window.Telegram.WebApp.initDataUnsafe.user
          : undefined;

      let name = "Анонимный игрок";
      if (user) {
        const full = [user.first_name, user.last_name].filter(Boolean).join(" ").trim();
        if (full) name = full;
        else if (user.username) name = user.username;
      }

      claimBtn.disabled = true;

      let res;
      try {
        res = await fetch("/api/send-prize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, prize }),
        });
      } catch (e) {
        showErr(
          "Ошибка сети: " + (e && e.message ? e.message : "проверьте подключение")
        );
        claimBtn.disabled = false;
        return;
      }

      let data;
      try {
        data = await res.json();
      } catch {
        showErr("Не удалось разобрать ответ сервера.");
        claimBtn.disabled = false;
        return;
      }

      if (!res.ok || !data.success) {
        showErr(
          (data && data.error) || "Не удалось отправить уведомление."
        );
        claimBtn.disabled = false;
        return;
      }

      try {
        localStorage.setItem(LS_PLAYED, "true");
      } catch (e) {
        /* ignore */
      }

      claimBtn.textContent = "Отправлено";
      claimBtn.disabled = true;
      closeModal();
      applyPlayedState();

      setTimeout(function () {
        if (tg && typeof tg.close === "function") {
          tg.close();
        }
      }, 1200);
    });

    initPlayedGate();

    window.addEventListener("resize", function () {
      if (!spinning && drumStrip.children.length) {
        itemHeightPx = readItemHeight();
        const viewH = drumViewport.getBoundingClientRect().height;
        const winIndex = drumStrip.children.length - 1;
        applyStripTransform(translateForCenteredIndex(winIndex, viewH));
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Whoosh — Лояльность</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --y: #FFD500;
      --y-dim: #F0C800;
      --black: #0A0A0A;
      --surface: #141414;
      --card: #1C1C1C;
      --card2: #222222;
      --muted: #666666;
      --text: #FFFFFF;
      --text-sec: #AAAAAA;
      --radius: 16px;
      --drum-item-h: 80px;
      --drum-card-gap: 10px;
      --drum-view-h: calc(3 * var(--drum-item-h) + 2 * var(--drum-card-gap));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html { min-height: 100dvh; background: var(--black); }
    html, body {
      font-family: 'Manrope', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body {
      min-height: 100dvh;
      width: 100%;
      color: var(--text);
      background: var(--black);
    }

    body.auth-mode { background: var(--black); }

    .screen { display: none; }
    .screen.is-active { display: flex; }

    /* ——— Загрузка ——— */
    .boot-loading {
      position: fixed; inset: 0; z-index: 1000;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--black); padding: 24px;
    }
    .boot-loading.is-visible { display: flex; }
    .boot-loading__spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,213,0,0.15);
      border-top-color: var(--y);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .boot-loading__text {
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-sec); text-align: center;
      max-width: 260px; line-height: 1.5;
    }

    /* ——— Авторизация ——— */
    .auth-screen {
      flex-direction: column; align-items: center; justify-content: center;
      min-height: 100dvh; padding: 40px 24px; width: 100%;
      background: var(--black);
    }

    .auth-logo-wrap {
      width: 80px; height: 80px;
      background: var(--y);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 0 40px rgba(255,213,0,0.3);
    }
    .auth-logo { width: 52px; height: 52px; object-fit: contain; }

    .auth-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem; letter-spacing: 0.1em;
      color: var(--text); margin-bottom: 8px;
    }
    .auth-sub {
      font-size: 0.82rem; color: var(--text-sec);
      margin-bottom: 36px; text-align: center;
      max-width: 280px; line-height: 1.55;
    }

    .auth-field-label {
      align-self: stretch; max-width: 360px;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 10px; color: var(--text-sec);
    }
    .auth-input {
      width: 100%; max-width: 360px;
      padding: 17px 20px;
      font-family: 'Manrope', sans-serif;
      font-size: 1.05rem; font-weight: 600;
      letter-spacing: 0.04em;
      border: 1.5px solid #2A2A2A;
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .auth-input::placeholder { color: #444; font-weight: 500; }
    .auth-input:focus { outline: none; border-color: var(--y); }

    .btn-auth-enter {
      width: 100%; max-width: 360px;
      padding: 19px 24px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 0.15em;
      border: none; border-radius: var(--radius);
      background: var(--y); color: var(--black);
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .btn-auth-enter:active { opacity: 0.85; transform: scale(0.98); }
    .btn-auth-enter:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ——— Главный экран ——— */
    .app {
      width: 100%; max-width: 520px;
      min-height: 100dvh; margin: 0 auto;
      display: flex; flex-direction: column;
      padding: max(16px, env(safe-area-inset-top,0)) 20px max(20px, env(safe-area-inset-bottom,0));
      background: var(--black);
    }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding-bottom: 20px; flex-shrink: 0;
    }
    .header-logo-wrap {
      width: 40px; height: 40px; background: var(--y);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
    }
    .header-logo { width: 26px; height: 26px; object-fit: contain; }
    .header-center { text-align: center; flex: 1; }
    .header-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem; letter-spacing: 0.2em; color: var(--text);
      line-height: 1;
    }
    .header-sub {
      font-size: 0.62rem; font-weight: 600;
      color: var(--text-sec); letter-spacing: 0.08em;
      text-transform: uppercase; margin-top: 2px;
    }
    .header-right { width: 40px; } /* spacer */

    /* Subtitle pill */
    .subtitle-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,213,0,0.1);
      border: 1px solid rgba(255,213,0,0.2);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 0.72rem; font-weight: 600;
      color: var(--y);
      margin-bottom: 4px;
      align-self: center;
    }
    .subtitle-pill::before { content: '⚡'; font-size: 0.75rem; }

    /* Main stack */
    .main-stack {
      flex: 1 1 auto;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; min-height: 0; width: 100%; padding: 4px 0;
    }

    /* KM block */
    .km-block {
      width: 100%; background: var(--card);
      border-radius: var(--radius); padding: 16px 18px;
      border: 1px solid #2A2A2A;
    }
    .km-block__top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .km-block__label {
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-sec);
    }
    .km-block__value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem; letter-spacing: 0.05em;
      color: var(--y); line-height: 1;
    }
    .km-block__track {
      height: 6px; border-radius: 999px;
      background: rgba(255,255,255,0.06); overflow: hidden;
    }
    .km-block__fill {
      height: 100%; width: 0%; border-radius: inherit;
      background: linear-gradient(90deg, var(--y-dim), var(--y));
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 12px rgba(255,213,0,0.4);
    }

    /* Drum */
    .drum-assembly {
      position: relative;
      display: flex; flex-direction: row; align-items: center;
      justify-content: center;
      width: 100%; flex-shrink: 0;
    }

    .drum-viewport {
      position: relative; flex: 1; min-width: 0;
      height: var(--drum-view-h); overflow: hidden;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid #2A2A2A;
    }

    .drum-fade {
      position: absolute; left: 0; right: 0; z-index: 2;
      pointer-events: none; height: 38%;
    }
    .drum-fade--top {
      top: 0;
      background: linear-gradient(to bottom, var(--card) 0%, transparent 100%);
    }
    .drum-fade--bottom {
      bottom: 0;
      background: linear-gradient(to top, var(--card) 0%, transparent 100%);
    }

    /* Active slot highlight */
    .drum-active-line {
      position: absolute; left: 0; right: 0; z-index: 1;
      top: 50%; transform: translateY(-50%);
      height: var(--drum-item-h);
      background: rgba(255,213,0,0.04);
      border-top: 1px solid rgba(255,213,0,0.15);
      border-bottom: 1px solid rgba(255,213,0,0.15);
      pointer-events: none;
    }

    .drum-strip {
      will-change: transform;
      display: flex; flex-direction: column;
      gap: var(--drum-card-gap);
      padding: 0 4px;
    }

    .drum-card {
      height: var(--drum-item-h); flex-shrink: 0;
      display: flex; flex-direction: row; align-items: center;
      gap: 14px; padding: 10px 14px;
      border-radius: 12px;
      background: transparent;
    }

    .drum-card__icon {
      width: 50px; height: 50px;
      background: var(--y);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .drum-card__logo {
      width: 32px; height: 32px; object-fit: contain;
      pointer-events: none;
    }
    .drum-card__big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem; letter-spacing: 0.04em;
      color: var(--text); line-height: 1;
    }
    .drum-card__small {
      margin-top: 3px;
      font-size: 0.62rem; font-weight: 700;
      color: var(--text-sec); text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Pointer */
    .drum-pointer {
      flex-shrink: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 10px 0 10px 16px;
      border-color: transparent transparent transparent var(--y);
      margin-right: 10px;
      filter: drop-shadow(0 0 6px rgba(255,213,0,0.5));
    }

    /* Hint */
    .hint {
      font-size: 0.72rem; font-weight: 500;
      color: var(--text-sec); text-align: center;
      line-height: 1.5; max-width: 320px; padding: 0 8px;
    }

    /* Admin panel */
    .admin-km-panel {
      width: 100%; display: flex; justify-content: center; margin-top: -4px;
    }
    .btn-admin-km {
      padding: 8px 20px;
      font-family: 'Manrope', sans-serif;
      font-size: 0.65rem; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      border: 1px solid rgba(255,213,0,0.4);
      border-radius: 999px; cursor: pointer;
      color: var(--y); background: rgba(255,213,0,0.08);
      transition: background 0.15s;
    }
    .btn-admin-km:active { background: rgba(255,213,0,0.15); }

    /* Spin button */
    .btn-spin {
      width: 100%;
      padding: 22px 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem; letter-spacing: 0.18em;
      border: none; border-radius: var(--radius);
      cursor: pointer; color: var(--black);
      background: var(--y);
      box-shadow: 0 4px 24px rgba(255,213,0,0.25);
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      position: relative; overflow: hidden;
    }
    .btn-spin::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-spin:active:not(:disabled) { transform: scale(0.98); box-shadow: 0 2px 12px rgba(255,213,0,0.2); }
    .btn-spin:disabled:not(.is-waiting) {
      background: #2A2A2A; color: #555;
      cursor: not-allowed; box-shadow: none;
    }
    .btn-spin.is-waiting { opacity: 0.75; }
    .btn-spin:disabled.is-waiting { background: var(--y); color: var(--black); }
    .btn-spin--long { font-size: clamp(0.75rem, 3.5vw, 1rem); letter-spacing: 0.1em; padding: 20px 14px; }

    /* Overlay */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 0 0 max(16px, env(safe-area-inset-bottom));
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .overlay.is-open { opacity: 1; pointer-events: auto; }

    /* Modal — bottom sheet */
    .modal {
      width: 100%; max-width: 480px;
      background: var(--card);
      color: var(--text);
      border-radius: 24px 24px 16px 16px;
      padding: 8px 24px 28px;
      box-shadow: 0 -8px 48px rgba(0,0,0,0.4);
      transform: translateY(40px);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .overlay.is-open .modal { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px; border-radius: 999px;
      background: #333; margin: 12px auto 20px;
    }

    .modal h2 {
      font-size: 0.6rem; font-weight: 800;
      letter-spacing: 0.25em; text-transform: uppercase;
      text-align: center; margin-bottom: 6px;
      color: var(--text-sec);
    }
    .modal-prize {
      font-family: 'Bebas Neue', sans-serif;
      text-align: center; font-size: 2rem;
      letter-spacing: 0.05em;
      color: var(--text); margin-bottom: 16px; line-height: 1.1;
    }
    .modal-promo-label {
      text-align: center; font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-sec); margin-bottom: 8px;
    }
    .modal-promo-code {
      text-align: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.4rem, 6vw, 1.9rem);
      letter-spacing: 0.06em;
      margin: 0 0 20px;
      padding: 14px;
      background: rgba(255,213,0,0.1);
      border: 1px dashed rgba(255,213,0,0.35);
      border-radius: var(--radius);
      color: var(--y);
      word-break: break-all;
    }
    .modal-physical-notice {
      text-align: center; font-size: 0.8rem; font-weight: 700;
      line-height: 1.45; margin-bottom: 16px;
      color: var(--text-sec);
    }
    .modal-actions { display: flex; flex-direction: column; gap: 10px; }

    .btn-contact-tg {
      display: block; width: 100%; padding: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 0.12em;
      text-align: center; text-decoration: none;
      border-radius: var(--radius);
      background: var(--y); color: var(--black);
      transition: opacity 0.15s;
    }
    .btn-copy-promo {
      padding: 16px; font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 0.12em;
      border: 1.5px solid rgba(255,213,0,0.3);
      border-radius: var(--radius);
      background: transparent; color: var(--y); cursor: pointer;
      transition: background 0.15s;
    }
    .btn-copy-promo:active { background: rgba(255,213,0,0.08); }

    .btn-claim {
      padding: 18px; font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem; letter-spacing: 0.15em;
      border: none; border-radius: var(--radius);
      background: var(--y); color: var(--black); cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,213,0,0.2);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-claim:active { transform: scale(0.98); }
    .btn-claim:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      padding: 14px; font-family: 'Manrope', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      border: 1px solid #2A2A2A;
      border-radius: var(--radius);
      background: transparent; color: var(--text-sec); cursor: pointer;
      transition: border-color 0.15s;
    }
    .btn-secondary:active { border-color: #444; }

    @media (max-height: 700px) {
      :root { --drum-item-h: 72px; }
      .km-block { padding: 13px 16px; }
      .btn-spin { padding: 18px 20px; }
    }
  </style>
</head>
<body>
  <div class="boot-loading" id="bootLoading" aria-live="polite">
    <div class="boot-loading__spinner" aria-hidden="true"></div>
    <p class="boot-loading__text">Подключение к серверам Whoosh...</p>
  </div>

  <div class="screen auth-screen" id="authScreen" hidden>
    <div class="auth-logo-wrap">
      <img class="auth-logo" src="/whoosh.png" alt="Whoosh" width="52" height="52" />
    </div>
    <p class="auth-title">WHOOSH</p>
    <p class="auth-sub">Войдите по номеру телефона, чтобы открыть барабан бонусов</p>
    <label class="auth-field-label" for="phoneInput">Телефон</label>
    <input
      class="auth-input"
      id="phoneInput"
      type="tel"
      inputmode="tel"
      autocomplete="tel"
      placeholder="+7 (999) 000-00-00"
    />
    <button type="button" class="btn-auth-enter" id="authEnterBtn">ВОЙТИ</button>
  </div>

  <div class="app" id="mainApp" hidden>
    <header>
      <div class="header-logo-wrap">
        <img class="header-logo" src="/whoosh.png" alt="Whoosh" width="26" height="26" />
      </div>
      <div class="header-center">
        <div class="header-brand">WHOOSH</div>
        <div class="header-sub">Бонусная программа</div>
      </div>
      <div class="header-right"></div>
    </header>

    <div class="main-stack">
      <div class="subtitle-pill" id="subtitleLine">Первый прокрут бесплатно</div>

      <div class="km-block" id="kmBlock">
        <div class="km-block__top">
          <span class="km-block__label">Ваш пробег</span>
          <span class="km-block__value" id="kmBlockValue">0 КМ</span>
        </div>
        <div class="km-block__track" aria-hidden="true">
          <div class="km-block__fill" id="kmBlockFill"></div>
        </div>
      </div>

      <div class="drum-assembly" id="drumAssembly">
        <div class="drum-pointer" aria-hidden="true"></div>
        <div class="drum-viewport" id="drumViewport">
          <div class="drum-active-line" aria-hidden="true"></div>
          <div class="drum-fade drum-fade--top" aria-hidden="true"></div>
          <div class="drum-fade drum-fade--bottom" aria-hidden="true"></div>
          <div class="drum-strip" id="drumStrip"></div>
        </div>
      </div>

      <p class="hint" id="hintLine">Первый прокрут бесплатно. Далее — 250 км с баланса.</p>

      <button type="button" class="btn-spin" id="spinBtn">КРУТИТЬ</button>
    </div>
  </div>

  <div class="overlay" id="prizeOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2 id="modalTitle">Поздравляем</h2>
      <p class="modal-prize" id="modalPrize"></p>
      <p class="modal-physical-notice" id="modalPhysicalNotice" hidden></p>
      <p class="modal-promo-label" id="modalPromoLabel">Промокод</p>
      <p class="modal-promo-code" id="modalPromoCode" aria-live="polite"></p>
      <div class="modal-actions">
        <a class="btn-contact-tg" id="contactTgBtn" href="https://t.me/graceqqq" rel="noopener noreferrer" hidden>СВЯЗАТЬСЯ</a>
        <button type="button" class="btn-copy-promo" id="copyPromoBtn"></button>
        <button type="button" class="btn-claim" id="claimBtn"></button>
        <button type="button" class="btn-secondary" id="closeModalBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const KM_TARGET = 250;
    const STRIP_POOL_REPEATS = 100;
    const PHYSICAL_PRIZE_CHAT_URL = "https://t.me/graceqqq";
    const DEMO_ADMIN_IDS = [821470232, 1106885262];

    const WHOOSH_LOGO_SRC = "/whoosh.png";
    const LABEL_COPY_PROMO = "СКОПИРОВАТЬ ПРОМОКОД";
    const LABEL_COPIED = "СКОПИРОВАНО";
    const LABEL_CLAIM = "ЗАБРАТЬ ПРИЗ";
    const LABEL_CONTACT = "СВЯЗАТЬСЯ";
    const LABEL_SPIN = "КРУТИТЬ";
    const LABEL_FREE_SPIN = "БЕСПЛАТНАЯ ПРОКРУТКА";

    const PRIZE_POOL = [
      { title: "iPhone 16", big: "16", small: "iPhone", weight: 0.01 },
      { title: "AirPods 4", big: "4", small: "AirPods", weight: 0.05 },
      { title: "Whoosh Pass на год", big: "365", small: "дней Pass", weight: 0.1, promoSlug: "365" },
      { title: "Whoosh Pass на месяц", big: "30", small: "дней Pass", weight: 1, promoSlug: "30" },
      { title: "500 бонусов", big: "500", small: "бонусов", weight: 3, promoSlug: "500" },
      { title: "3 бесплатных старта", big: "3", small: "бесплатных старта", weight: 15, promoSlug: "START3" },
      { title: "100 бонусов", big: "100", small: "бонусов", weight: 35, promoSlug: "100" },
      { title: "Скидка 10% на поездку", big: "10%", small: "на поездку", weight: 45.84, promoSlug: "RIDE10" },
    ];

    const PROMO_RND = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

    function pickWeightedPrize() {
      const r = Math.random() * 100;
      let cum = 0;
      for (let i = 0; i < PRIZE_POOL.length; i++) {
        cum += PRIZE_POOL[i].weight;
        if (r < cum) return PRIZE_POOL[i];
      }
      return PRIZE_POOL[PRIZE_POOL.length - 1];
    }

    function cloneEntry(entry) {
      return { title: entry.title, big: entry.big, small: entry.small, promoSlug: entry.promoSlug };
    }

    function isPhysicalPrize(entry) {
      const t = entry && entry.title;
      return t === "iPhone 16" || t === "AirPods 4";
    }

    function generatePromo(prefix) {
      let mid = String(prefix || "BONUS").replace(/[^A-Za-z0-9]/g, "").toUpperCase() || "BONUS";
      mid = mid.slice(0, 3);
      while (mid.length < 3) mid += PROMO_RND.charAt(Math.floor(Math.random() * PROMO_RND.length));
      let tail = "";
      for (let i = 0; i < 4; i++) tail += PROMO_RND.charAt(Math.floor(Math.random() * PROMO_RND.length));
      return "WHOOSH-" + mid + "-" + tail;
    }

    function promoForEntry(entry) {
      if (isPhysicalPrize(entry)) return "";
      return generatePromo(entry.promoSlug || "BONUS");
    }

    function buildStrip(winnerEntry) {
      const strip = [];
      for (let rep = 0; rep < STRIP_POOL_REPEATS; rep++) {
        for (let i = 0; i < PRIZE_POOL.length; i++) strip.push(cloneEntry(PRIZE_POOL[i]));
      }
      strip.push(cloneEntry(winnerEntry));
      return strip;
    }

    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    function getTelegramUserId() {
      const u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
      if (u && u.id != null) return u.id;
      try {
        const q = new URLSearchParams(window.location.search).get("telegramId");
        if (q) { const n = Number(q); if (Number.isFinite(n)) return n; }
      } catch (e) {}
      return null;
    }

    function isDemoAdmin() {
      const id = getTelegramUserId();
      return id != null && DEMO_ADMIN_IDS.some(function(x) { return x == id; });
    }

    let sessionUser = null;
    let spinning = false;
    let currentPrizeText = "";
    let currentPromoCode = "";
    let currentIsPhysical = false;
    let spinRafId = null;
    let spinTimeoutId = null;

    const bootLoading = document.getElementById("bootLoading");
    const authScreen = document.getElementById("authScreen");
    const mainApp = document.getElementById("mainApp");
    const phoneInput = document.getElementById("phoneInput");
    const authEnterBtn = document.getElementById("authEnterBtn");
    const subtitleLine = document.getElementById("subtitleLine");
    const kmBlockValue = document.getElementById("kmBlockValue");
    const kmBlockFill = document.getElementById("kmBlockFill");
    const spinBtn = document.getElementById("spinBtn");
    const drumStrip = document.getElementById("drumStrip");
    const drumViewport = document.getElementById("drumViewport");
    const prizeOverlay = document.getElementById("prizeOverlay");
    const modalPrize = document.getElementById("modalPrize");
    const modalPhysicalNotice = document.getElementById("modalPhysicalNotice");
    const modalPromoLabel = document.getElementById("modalPromoLabel");
    const modalPromoCode = document.getElementById("modalPromoCode");
    const contactTgBtn = document.getElementById("contactTgBtn");
    const copyPromoBtn = document.getElementById("copyPromoBtn");
    const claimBtn = document.getElementById("claimBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    copyPromoBtn.textContent = LABEL_COPY_PROMO;
    claimBtn.textContent = LABEL_CLAIM;
    contactTgBtn.textContent = LABEL_CONTACT;
    contactTgBtn.href = PHYSICAL_PRIZE_CHAT_URL;

    function showBootLoading(on) { bootLoading.classList.toggle("is-visible", !!on); }
    function setBodyAuthMode(on) { document.body.classList.toggle("auth-mode", !!on); }

    function showAuthOnly() {
      authScreen.hidden = false; authScreen.classList.add("is-active");
      mainApp.hidden = true; setBodyAuthMode(true);
    }

    function showMainOnly() {
      authScreen.hidden = true; authScreen.classList.remove("is-active");
      mainApp.hidden = false; setBodyAuthMode(false);
      injectDemoAdminPanel();
    }

    function injectDemoAdminPanel() {
      if (!isDemoAdmin() || document.getElementById("demoKmPanel")) return;
      const panel = document.createElement("div");
      panel.className = "admin-km-panel"; panel.id = "demoKmPanel";
      const btn = document.createElement("button");
      btn.type = "button"; btn.className = "btn-admin-km"; btn.textContent = "+50 КМ";
      btn.addEventListener("click", async function() {
        const tid = getTelegramUserId();
        try {
          const res = await fetch("/api/add-demo-km", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ telegramId: tid })
          });
          const data = await res.json().catch(function() { return {}; });
          if (res.ok && data.mileage != null) { sessionUser.mileage = data.mileage; refreshUi(); }
          else showErr((data && data.error) || "Ошибка");
        } catch(e) { showErr("Сеть"); }
      });
      panel.appendChild(btn);
      spinBtn.insertAdjacentElement("afterend", panel);
    }

    function showErr(msg) {
      if (tg && typeof tg.showAlert === "function") tg.showAlert(msg);
      else alert(msg);
    }

    async function apiMe() {
      const tid = getTelegramUserId();
      const res = await fetch("/api/me?telegramId=" + encodeURIComponent(String(tid)));
      if (res.status === 404) return null;
      if (!res.ok) throw new Error("me");
      return res.json();
    }

    function refreshUi() {
      if (!sessionUser) return;
      const km = Number(sessionUser.mileage) || 0;
      kmBlockValue.textContent = Math.floor(km) + " КМ";
      const pct = Math.min(100, (km / KM_TARGET) * 100);
      kmBlockFill.style.width = pct + "%";

      if (isDemoAdmin()) {
        subtitleLine.textContent = "Демо: +50 км без списания баланса";
      } else if (sessionUser.free_spin_available) {
        subtitleLine.textContent = "Первый прокрут — бесплатно";
      } else {
        subtitleLine.textContent = "Каждые 250 км — новый прокрут";
      }

      if (spinning) return;
      spinBtn.classList.remove("btn-spin--long", "is-waiting");

      if (isDemoAdmin()) {
        spinBtn.disabled = false; spinBtn.textContent = LABEL_SPIN; return;
      }
      if (sessionUser.free_spin_available) {
        spinBtn.disabled = false; spinBtn.textContent = LABEL_FREE_SPIN;
        spinBtn.classList.add("btn-spin--long"); return;
      }
      if (km >= KM_TARGET) {
        spinBtn.disabled = false; spinBtn.textContent = LABEL_SPIN; return;
      }
      spinBtn.disabled = true;
      const need = Math.max(0, Math.ceil(KM_TARGET - km));
      spinBtn.textContent = "Нужно ещё " + need + " км";
    }

    function readItemHeight() {
      const v = getComputedStyle(document.documentElement).getPropertyValue("--drum-item-h").trim();
      const p = parseFloat(v); return Number.isFinite(p) ? p : 80;
    }
    function readStripGapPx() {
      const v = getComputedStyle(document.documentElement).getPropertyValue("--drum-card-gap").trim();
      const p = parseFloat(v); return Number.isFinite(p) ? p : 10;
    }

    function translateForCenteredIndex(index, viewH) {
      const itemH = readItemHeight(), gap = readStripGapPx();
      const step = itemH + gap;
      const centerY = index * step + itemH / 2;
      return viewH / 2 - centerY;
    }

    function renderStripRow(entry) {
      const row = document.createElement("div");
      row.className = "drum-card";
      row.innerHTML =
        '<div class="drum-card__icon" aria-hidden="true">' +
        '<img class="drum-card__logo" src="' + WHOOSH_LOGO_SRC + '" alt="" decoding="async" /></div>' +
        '<div><div class="drum-card__big"></div><div class="drum-card__small"></div></div>';
      const img = row.querySelector(".drum-card__logo");
      img.addEventListener("error", function() { this.remove(); });
      row.querySelector(".drum-card__big").textContent = entry.big;
      row.querySelector(".drum-card__small").textContent = entry.small;
      return row;
    }

    function fillStripFromData(entries) {
      drumStrip.innerHTML = "";
      for (let i = 0; i < entries.length; i++) drumStrip.appendChild(renderStripRow(entries[i]));
    }

    function cancelSpinAnimation() {
      if (spinTimeoutId !== null) { clearTimeout(spinTimeoutId); spinTimeoutId = null; }
      if (spinRafId !== null) { cancelAnimationFrame(spinRafId); spinRafId = null; }
    }

    function easeCubicBezier(t, x1, y1, x2, y2) {
      if (t <= 0) return 0; if (t >= 1) return 1;
      let lo = 0, hi = 1;
      for (let i = 0; i < 28; i++) {
        const u = (lo + hi) / 2;
        const bx = 3*(1-u)*(1-u)*u*x1 + 3*(1-u)*u*u*x2 + u*u*u;
        if (bx < t) lo = u; else hi = u;
      }
      const u = (lo + hi) / 2;
      return 3*(1-u)*(1-u)*u*y1 + 3*(1-u)*u*u*y2 + u*u*u;
    }
    const easeSpin = function(t) { return easeCubicBezier(t, 0.2, 0, 0.3, 1); };

    const spinSound = new Audio("wheel-of-fortune.mp3");
    spinSound.preload = "auto";

    async function spin() {
      if (spinning || !sessionUser) return;
      const tid = getTelegramUserId();

      if (!isDemoAdmin()) {
        if (!sessionUser.free_spin_available && (Number(sessionUser.mileage) || 0) < KM_TARGET) return;
      }

      let reserve;
      try {
        const res = await fetch("/api/spin-reserve", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ telegramId: tid })
        });
        reserve = await res.json().catch(function() { return {}; });
        if (!res.ok) { showErr((reserve && reserve.error) || "Недостаточно км"); return; }
      } catch(e) { showErr("Сеть"); return; }

      if (!isDemoAdmin()) {
        sessionUser.mileage = reserve.mileage;
        sessionUser.free_spin_available = reserve.free_spin_available;
      }
      refreshUi();

      cancelSpinAnimation();
      const won = pickWeightedPrize();
      const stripData = buildStrip(won);
      fillStripFromData(stripData);
      const viewH = drumViewport.getBoundingClientRect().height;
      const winIndex = stripData.length - 1;
      const yStart = translateForCenteredIndex(0, viewH);
      const yEnd = translateForCenteredIndex(winIndex, viewH);
      drumStrip.style.transform = "translateY(" + yStart + "px)";

      spinSound.pause(); spinSound.currentTime = 0;
      spinSound.play().catch(function() {});

      spinBtn.classList.add("is-waiting"); spinBtn.disabled = true; spinning = true;

      const SPIN_MS = 4500;
      const startTime = performance.now();

      function frame(now) {
        const elapsed = now - startTime;
        const t = Math.min(1, elapsed / SPIN_MS);
        const e = easeSpin(t);
        drumStrip.style.transform = "translateY(" + (yStart + (yEnd - yStart) * e) + "px)";
        if (t < 1) spinRafId = requestAnimationFrame(frame);
        else spinRafId = null;
      }
      spinRafId = requestAnimationFrame(frame);

      spinTimeoutId = setTimeout(function() {
        spinTimeoutId = null; cancelSpinAnimation();
        drumStrip.style.transform = "translateY(" + yEnd + "px)";
        spinSound.pause();
        currentPrizeText = won.title;
        currentIsPhysical = isPhysicalPrize(won);
        currentPromoCode = currentIsPhysical ? "" : promoForEntry(won);
        spinning = false; spinBtn.classList.remove("is-waiting");
        refreshUi(); openPrizeModal();
      }, SPIN_MS);
    }

    function openPrizeModal() {
      modalPrize.textContent = currentPrizeText;
      if (currentIsPhysical) {
        modalPhysicalNotice.hidden = false;
        modalPhysicalNotice.textContent = "Для получения свяжитесь с менеджером.";
        contactTgBtn.hidden = false;
        modalPromoLabel.hidden = true; modalPromoCode.hidden = true; copyPromoBtn.hidden = true;
        modalPromoCode.textContent = "";
      } else {
        modalPhysicalNotice.hidden = true; contactTgBtn.hidden = true;
        modalPromoLabel.hidden = false; modalPromoCode.hidden = false; copyPromoBtn.hidden = false;
        modalPromoCode.textContent = currentPromoCode;
        copyPromoBtn.textContent = LABEL_COPY_PROMO;
      }
      claimBtn.textContent = LABEL_CLAIM; claimBtn.disabled = false;
      prizeOverlay.classList.add("is-open");
    }

    function closePrizeModal() { prizeOverlay.classList.remove("is-open"); refreshUi(); }

    contactTgBtn.addEventListener("click", function(e) {
      e.preventDefault();
      const url = PHYSICAL_PRIZE_CHAT_URL;
      if (tg && typeof tg.openTelegramLink === "function") tg.openTelegramLink(url);
      else window.open(url, "_blank", "noopener,noreferrer");
    });

    copyPromoBtn.addEventListener("click", async function() {
      if (copyPromoBtn.hidden) return;
      const text = currentPromoCode || modalPromoCode.textContent || "";
      if (!text) return;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) await navigator.clipboard.writeText(text);
        else {
          const ta = document.createElement("textarea");
          ta.value = text; document.body.appendChild(ta); ta.select();
          document.execCommand("copy"); document.body.removeChild(ta);
        }
        copyPromoBtn.textContent = LABEL_COPIED;
        setTimeout(function() {
          if (prizeOverlay.classList.contains("is-open")) copyPromoBtn.textContent = LABEL_COPY_PROMO;
        }, 2000);
      } catch(e) { showErr("Копирование не удалось"); }
    });

    claimBtn.addEventListener("click", async function() {
      if (claimBtn.disabled) return;
      claimBtn.disabled = true;
      try {
        const res = await fetch("/api/send-prize", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) || "Гость",
            prize: currentPrizeText,
            promoCode: currentIsPhysical ? "" : currentPromoCode,
            userId: tg?.initDataUnsafe?.user?.id ?? getTelegramUserId()
          })
        });
        const data = await res.json().catch(function() { return {}; });
        if (!res.ok || !data.success) {
          showErr((data && data.error) || "Ошибка");
          claimBtn.disabled = false; return;
        }
        claimBtn.textContent = "ОТПРАВЛЕНО";
        closePrizeModal();
        if (tg && typeof tg.showAlert === "function") tg.showAlert("Приз отправлен!");
      } catch(e) { claimBtn.disabled = false; showErr("Сеть"); }
    });

    closeModalBtn.addEventListener("click", closePrizeModal);
    spinBtn.addEventListener("click", spin);

    phoneInput.addEventListener("input", function() {
      let v = phoneInput.value.replace(/\D/g, "");
      if (v.startsWith("8")) v = "7" + v.slice(1);
      if (v.startsWith("7") && v.length > 1) phoneInput.value = "+" + v;
      else if (v.length > 0) phoneInput.value = "+" + v;
    });

    authEnterBtn.addEventListener("click", async function() {
      const raw = phoneInput.value.replace(/\D/g, "");
      if (raw.length < 10) { showErr("Введите корректный номер"); return; }
      authEnterBtn.disabled = true;
      showBootLoading(true);
      const start = Date.now();
      try {
        const response = await fetch("/api/save-user", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id: window.Telegram?.WebApp?.initDataUnsafe?.user?.id != null
              ? window.Telegram.WebApp.initDataUnsafe.user.id : getTelegramUserId(),
            phone: phoneInput.value
          })
        });
        const data = await response.json().catch(function() { return {}; });
        if (!response.ok) {
          showBootLoading(false); authEnterBtn.disabled = false;
          showErr("Ошибка сервера: " + (data.error || "Неизвестно")); return;
        }
        sessionUser = { mileage: data.mileage, free_spin_available: !data.first_spin_done };
      } catch(e) {
        showBootLoading(false); authEnterBtn.disabled = false;
        showErr("Ошибка сервера: " + (e && e.message ? e.message : "сеть")); return;
      }
      const elapsed = Date.now() - start;
      if (elapsed < 3000) await new Promise(function(r) { setTimeout(r, 3000 - elapsed); });
      showBootLoading(false); authEnterBtn.disabled = false;
      showMainOnly(); refreshUi();
    });

    window.addEventListener("resize", function() {
      if (!spinning && drumStrip.children.length) {
        const viewH = drumViewport.getBoundingClientRect().height;
        const winIndex = drumStrip.children.length - 1;
        drumStrip.style.transform = "translateY(" + translateForCenteredIndex(winIndex, viewH) + "px)";
      }
    });

    (async function boot() {
      const tid = getTelegramUserId();
      if (tid == null) {
        showErr("Откройте в Telegram или ?telegramId=");
        showAuthOnly(); return;
      }
      try {
        const me = await apiMe();
        if (!me) { showAuthOnly(); return; }
        sessionUser = me; showMainOnly(); refreshUi();
      } catch(e) {
        showErr("Не удалось загрузить данные");
        showAuthOnly();
      }
    })();
  </script>
</body>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Колесо удачи</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --app-radius: 20px;
      --app-radius-sm: 14px;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
      --wheel-border: color-mix(in srgb, var(--tg-theme-text-color, #000) 12%, transparent);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--tg-theme-bg-color, #212121);
      color: var(--tg-theme-text-color, #fff);
      -webkit-font-smoothing: antialiased;
    }

    body {
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .app {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    header {
      text-align: center;
      width: 100%;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--tg-theme-text-color, #fff);
    }

    .subtitle {
      margin-top: 6px;
      font-size: 0.9rem;
      opacity: 0.72;
      color: var(--tg-theme-hint-color, #aaa);
    }

    .wheel-wrap {
      position: relative;
      width: min(92vw, 320px);
      aspect-ratio: 1;
      filter: drop-shadow(0 16px 32px rgba(0, 0, 0, 0.25));
    }

    .pointer {
      position: absolute;
      left: 50%;
      top: -6px;
      transform: translateX(-50%);
      z-index: 3;
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 32px solid var(--tg-theme-button-color, #3390ec);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.35));
      animation: pointer-bob 1.1s ease-in-out infinite;
      transform-origin: 50% 0;
    }

    @keyframes pointer-bob {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
      50% { transform: translateX(-50%) translateY(4px) scale(1.04); }
    }

    .wheel-ring {
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      border: 4px solid var(--wheel-border);
      box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--tg-theme-bg-color, #000) 40%, transparent);
      pointer-events: none;
      z-index: 2;
    }

    #wheel {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .btn-spin {
      width: 100%;
      max-width: 320px;
      padding: 16px 24px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--app-radius);
      cursor: pointer;
      color: var(--tg-theme-button-text-color, #fff);
      background: linear-gradient(
        135deg,
        var(--tg-theme-button-color, #3390ec),
        color-mix(in srgb, var(--tg-theme-button-color, #3390ec) 70%, #000)
      );
      box-shadow: var(--shadow), 0 0 0 1px color-mix(in srgb, var(--tg-theme-button-color, #3390ec) 50%, transparent);
      transition: transform 0.15s ease, filter 0.15s ease, opacity 0.2s;
    }

    .btn-spin:hover:not(:disabled) {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    .btn-spin:active:not(:disabled) {
      transform: translateY(1px) scale(0.98);
    }

    .btn-spin:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .hint {
      font-size: 0.8rem;
      color: var(--tg-theme-hint-color, #888);
      text-align: center;
      max-width: 320px;
      line-height: 1.4;
    }

    /* Modal */
    .overlay {
      position: fixed;
      inset: 0;
      background: color-mix(in srgb, #000 45%, transparent);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: 100%;
      max-width: 340px;
      background: var(--tg-theme-secondary-bg-color, #2b2b2b);
      color: var(--tg-theme-text-color, #fff);
      border-radius: var(--app-radius);
      padding: 28px 24px 24px;
      box-shadow: var(--shadow);
      transform: scale(0.92) translateY(12px);
      transition: transform 0.4s cubic-bezier(0.34, 1.4, 0.64, 1);
      border: 1px solid color-mix(in srgb, var(--tg-theme-text-color, #fff) 8%, transparent);
    }

    .overlay.is-open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-badge {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--tg-theme-button-color, #3390ec), color-mix(in srgb, var(--tg-theme-button-color, #3390ec) 50%, #000));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
    }

    .modal h2 {
      font-size: 1.25rem;
      text-align: center;
      margin-bottom: 8px;
    }

    .modal-prize {
      text-align: center;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--tg-theme-link-color, var(--tg-theme-button-color, #6ab7ff));
      margin-bottom: 20px;
      line-height: 1.35;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-claim {
      padding: 14px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: var(--app-radius-sm);
      cursor: pointer;
      color: var(--tg-theme-button-text-color, #fff);
      background: var(--tg-theme-button-color, #3390ec);
      transition: filter 0.15s, transform 0.15s;
    }

    .btn-claim:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      padding: 12px;
      font-size: 0.9rem;
      border: none;
      border-radius: var(--app-radius-sm);
      cursor: pointer;
      background: transparent;
      color: var(--tg-theme-hint-color, #aaa);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Колесо удачи</h1>
      <p class="subtitle">Крути и забирай приз в нашем магазине</p>
    </header>

    <div class="wheel-wrap" aria-hidden="true">
      <div class="pointer"></div>
      <div class="wheel-ring"></div>
      <canvas id="wheel" width="640" height="640"></canvas>
    </div>

    <button type="button" class="btn-spin" id="spinBtn">Испытать удачу</button>
    <p class="hint">Один спин — один подарок. Покажите экран кассиру при получении приза.</p>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-badge" aria-hidden="true">&#127942;</div>
      <h2 id="modalTitle">Поздравляем!</h2>
      <p class="modal-prize" id="modalPrize"></p>
      <div class="modal-actions">
        <button type="button" class="btn-claim" id="claimBtn">Забрать приз</button>
        <button type="button" class="btn-secondary" id="closeModalBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    /**
     * ВНИМАНИЕ: токен в клиенте виден всем — для продакшена выносите sendMessage на сервер.
     */
    const BOT_TOKEN = "8392003499:AAG5RkZOn2TPkD75b3rVcsZvXMgny1rW-hA";
    const ADMIN_CHAT_ID = "821470232";

    const PRIZES = [
      'Скидка 5%',
      'Бесплатный кофе',
      'Скидка 10%',
      'Подарок к заказу',
      'Скидка 15%',
      'Секретный бонус',
    ];

    const SECTOR_COLORS = [
      '#5B8DEF',
      '#7C6CF0',
      '#4ECDC4',
      '#FF6B6B',
      '#FFD166',
      '#06D6A0',
    ];

    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const overlay = document.getElementById('overlay');
    const modalPrize = document.getElementById('modalPrize');
    const claimBtn = document.getElementById('claimBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');

    const N = PRIZES.length;
    const TAU = Math.PI * 2;
    const sectorAngle = TAU / N;

    let rotation = 0;
    let spinning = false;
    let currentPrizeIndex = 0;
    let currentPrizeText = '';

    function drawWheel() {
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const r = w / 2 - 8;

      ctx.clearRect(0, 0, w, h);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      for (let i = 0; i < N; i++) {
        const start = i * sectorAngle - Math.PI / 2;
        const end = start + sectorAngle;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, start, end);
        ctx.closePath();
        ctx.fillStyle = SECTOR_COLORS[i % SECTOR_COLORS.length];
        ctx.fill();

        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        const mid = start + sectorAngle / 2;
        ctx.rotate(mid);
        ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(255,255,255,0.95)';
        ctx.font = 'bold 26px system-ui, sans-serif';
        const label = PRIZES[i];
        const maxChars = 14;
        const lines = label.length > maxChars ? [label.slice(0, maxChars - 1) + '…'] : [label];
        lines.forEach((line, j) => {
          ctx.fillText(line, r - 28, j * 30 - (lines.length - 1) * 15);
        });
        ctx.restore();
      }

      ctx.restore();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.arc(0, 0, 22, 0, TAU);
      ctx.fillStyle = tg && tg.themeParams && tg.themeParams.secondary_bg_color
        ? '#' + tg.themeParams.secondary_bg_color
        : 'rgba(40,40,40,0.95)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;

      const winnerIndex = Math.floor(Math.random() * N);
      const fullSpins = 5 + Math.floor(Math.random() * 2);
      const duration = 4000 + Math.random() * 1000;

      const localCenter =
        winnerIndex * sectorAngle + sectorAngle / 2 - Math.PI / 2;
      const pointerAngle = (3 * Math.PI) / 2;
      let delta = pointerAngle - localCenter - rotation;
      while (delta <= 0) delta += TAU;
      const targetRotation = rotation + fullSpins * TAU + delta;

      const startRot = rotation;
      const startTime = performance.now();

      function frame(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const e = easeOutCubic(t);
        rotation = startRot + (targetRotation - startRot) * e;
        drawWheel();
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          rotation = targetRotation;
          drawWheel();
          currentPrizeIndex = winnerIndex;
          currentPrizeText = PRIZES[winnerIndex];
          spinning = false;
          spinBtn.disabled = false;
          openModal(currentPrizeText);
        }
      }
      requestAnimationFrame(frame);
    }

    function openModal(prize) {
      modalPrize.textContent = prize;
      overlay.classList.add('is-open');
    }

    function closeModal() {
      overlay.classList.remove('is-open');
    }

    spinBtn.addEventListener('click', spin);
    closeModalBtn.addEventListener('click', closeModal);

    claimBtn.addEventListener('click', async function () {
      const prize = currentPrizeText;
      const user = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe
        ? window.Telegram.WebApp.initDataUnsafe.user
        : undefined;

      let userName = 'Анонимный игрок';
      if (user) {
        const full = [user.first_name, user.last_name].filter(Boolean).join(' ').trim();
        if (full) userName = full;
        else if (user.username) userName = user.username;
      }

      if (tg && typeof tg.showAlert === 'function') {
        tg.showAlert('Ваш приз: ' + prize);
      } else {
        alert('Ваш приз: ' + prize);
      }

      const text =
        '\uD83C\uDF81 Новый победитель! \nИмя: ' + userName + ' \nПриз: ' + prize;

      const url = 'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage';

      try {
        await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: ADMIN_CHAT_ID,
            text: text,
          }),
        });
      } catch (e) {
        console.error(e);
      }

      closeModal();
    });

    drawWheel();
    window.addEventListener('resize', function () {
      drawWheel();
    });
  </script>
</body>
</html>

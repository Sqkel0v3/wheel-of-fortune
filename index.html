<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Золотое Яблоко — Колесо</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --ga-bg: #ffffff;
      --ga-accent: #ccff00;
      --ga-line: #eeeeee;
      --ga-text: #000000;
      --ga-muted: #666666;
      --btn-radius: 0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: #ffffff;
      color: var(--ga-text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      padding: max(16px, env(safe-area-inset-top, 0px)) 18px max(24px, env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    header {
      text-align: center;
      width: 100%;
      padding: 4px 8px 0;
    }

    .brand-wordmark {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.5em;
      color: #000000;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(0.95rem, 4vw, 1.15rem);
      font-weight: 800;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      line-height: 1.45;
      color: #000000;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--ga-muted);
      line-height: 1.6;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    .wheel-wrap {
      position: relative;
      width: min(calc(100vw - 36px), 100%);
      max-width: 100%;
      aspect-ratio: 1;
    }

    .pointer {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      z-index: 3;
      width: 26px;
      height: 22px;
      margin-top: -1px;
      pointer-events: none;
    }

    .pointer svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    #wheel {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .btn-spin {
      width: 100%;
      max-width: 520px;
      padding: 22px 24px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--btn-radius);
      cursor: pointer;
      color: #000000;
      background: #ccff00;
      transition: opacity 0.15s ease;
    }

    .btn-spin:active:not(:disabled) {
      opacity: 0.88;
    }

    .btn-spin.is-waiting {
      opacity: 0.75;
    }

    .btn-spin:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hint {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--ga-muted);
      text-align: center;
      max-width: 340px;
      line-height: 1.6;
      padding: 0 6px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) 20px max(16px, env(safe-area-inset-bottom));
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: 100%;
      max-width: 336px;
      background: #ffffff;
      color: #000000;
      border-radius: 0;
      padding: 32px 24px 24px;
      border: 1px solid #eeeeee;
      transform: translateY(8px);
      opacity: 0.98;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .overlay.is-open .modal {
      transform: translateY(0);
      opacity: 1;
    }

    .modal-accent {
      width: calc(100% + 48px);
      height: 1px;
      background: #eeeeee;
      margin: -32px -24px 24px;
    }

    .modal h2 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 14px;
      color: #000000;
    }

    .modal-prize {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #000000;
      margin-bottom: 24px;
      line-height: 1.4;
      min-height: 2.3em;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-claim {
      padding: 18px 18px;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid #000000;
      border-radius: 0;
      cursor: pointer;
      color: #ffffff;
      background: #000000;
      transition: opacity 0.15s;
    }

    .btn-claim:active:not(:disabled) {
      opacity: 0.85;
    }

    .btn-claim:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      padding: 14px;
      font-family: inherit;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: 1px solid #eeeeee;
      border-radius: 0;
      cursor: pointer;
      background: #ffffff;
      color: var(--ga-muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <p class="brand-wordmark">GOLDEN APPLE</p>
      <h1>ПОЛУЧИТЕ ПОДАРОК</h1>
      <p class="subtitle">Крутите колесо в Золотом Яблоке</p>
    </header>

    <div class="wheel-wrap" id="wheelWrap" aria-hidden="true">
      <div class="pointer" aria-hidden="true">
        <svg viewBox="-1 -1 30 28" xmlns="http://www.w3.org/2000/svg">
          <polygon points="14,24 4,2 24,2" fill="#ccff00"/>
        </svg>
      </div>
      <canvas id="wheel"></canvas>
    </div>

    <button type="button" class="btn-spin" id="spinBtn">Испытать удачу</button>
    <p class="hint">Один спин — один подарок. Покажите экран сотруднику.</p>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-accent" aria-hidden="true"></div>
      <h2 id="modalTitle">Поздравляем</h2>
      <p class="modal-prize" id="modalPrize"></p>
      <div class="modal-actions">
        <button type="button" class="btn-claim" id="claimBtn">Получить приз</button>
        <button type="button" class="btn-secondary" id="closeModalBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const PRIZES = [
      "Скидка 5%",
      "100 бонусов",
      "Пробник",
      "Скидка 10%",
      "Маска",
      "Сэмпл",
    ];

    const SECTOR_FILL = ["#ffffff", "#f5f5f5"];
    const DIVIDER = "#eeeeee";
    const ACCENT_RING = "#ccff00";
    const LABEL_COLOR = "#000000";
    const HUB_FILL = "#ffffff";
    const HUB_STROKE = "#eeeeee";

    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    function showErr(msg) {
      if (tg && typeof tg.showAlert === "function") {
        tg.showAlert(msg);
      } else {
        alert(msg);
      }
    }

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const wheelWrap = document.getElementById("wheelWrap");
    const spinBtn = document.getElementById("spinBtn");
    const overlay = document.getElementById("overlay");
    const modalPrize = document.getElementById("modalPrize");
    const claimBtn = document.getElementById("claimBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    const N = PRIZES.length;
    const TAU = Math.PI * 2;
    const arc = TAU / N;

    let layoutSize = 300;
    let rotation = 0;
    let spinning = false;
    let currentPrizeText = "";

    function syncCanvasSize() {
      const rect = wheelWrap.getBoundingClientRect();
      const w = Math.max(180, Math.floor(rect.width));
      layoutSize = w;
      const dpr = Math.min(window.devicePixelRatio || 1, 3);
      const px = Math.max(1, Math.floor(w * dpr));
      canvas.width = px;
      canvas.height = px;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawWheel();
    }

    function drawWheel() {
      const centerX = layoutSize / 2;
      const centerY = layoutSize / 2;
      const ringW = Math.max(2, Math.min(3, Math.round(layoutSize * 0.009)));
      const radius = layoutSize / 2 - ringW / 2 - 1;
      const labelRadius = radius * 0.6;
      const maxTextWidth = 2 * labelRadius * Math.sin(arc / 2) - 10;
      const fontPx = 15;

      ctx.clearRect(0, 0, layoutSize, layoutSize);

      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(rotation);

      for (let i = 0; i < N; i++) {
        const startAngle = i * arc - Math.PI / 2;
        const endAngle = startAngle + arc;
        const middleAngle = startAngle + arc / 2;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = SECTOR_FILL[i % 2];
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.strokeStyle = DIVIDER;
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.save();
        ctx.rotate(middleAngle);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.direction = "ltr";
        ctx.fillStyle = LABEL_COLOR;
        ctx.font =
          "700 " + fontPx + "px Inter, system-ui, -apple-system, sans-serif";

        let text = PRIZES[i];
        if (ctx.measureText(text).width > maxTextWidth) {
          while (
            text.length > 1 &&
            ctx.measureText(text.slice(0, -1) + "…").width > maxTextWidth
          ) {
            text = text.slice(0, -1);
          }
          text = text.slice(0, -1) + "…";
        }

        ctx.fillText(text, labelRadius, 0);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, TAU);
      ctx.strokeStyle = ACCENT_RING;
      ctx.lineWidth = ringW;
      ctx.stroke();

      ctx.restore();

      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.beginPath();
      ctx.arc(0, 0, radius * 0.12, 0, TAU);
      ctx.fillStyle = HUB_FILL;
      ctx.fill();
      ctx.strokeStyle = HUB_STROKE;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    function easeOutQuint(t) {
      return 1 - Math.pow(1 - t, 5);
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      spinBtn.classList.add("is-waiting");

      const winnerIndex = Math.floor(Math.random() * N);
      const fullSpins = 10 + Math.floor(Math.random() * 5);
      const duration = 7500 + Math.random() * 2000;

      const localCenter = winnerIndex * arc + arc / 2 - Math.PI / 2;
      const pointerAngle = (3 * Math.PI) / 2;
      let delta = pointerAngle - localCenter - rotation;
      while (delta <= 0) delta += TAU;
      const targetRotation = rotation + fullSpins * TAU + delta;

      const startRot = rotation;
      const startTime = performance.now();

      function frame(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const e = easeOutQuint(t);
        rotation = startRot + (targetRotation - startRot) * e;
        drawWheel();
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          rotation = targetRotation;
          drawWheel();
          currentPrizeText = PRIZES[winnerIndex];
          spinning = false;
          spinBtn.disabled = false;
          spinBtn.classList.remove("is-waiting");
          openModal(currentPrizeText);
        }
      }
      requestAnimationFrame(frame);
    }

    function openModal(prize) {
      modalPrize.textContent = prize;
      claimBtn.textContent = "Получить приз";
      claimBtn.disabled = false;
      overlay.classList.add("is-open");
    }

    function closeModal() {
      overlay.classList.remove("is-open");
    }

    spinBtn.addEventListener("click", spin);
    closeModalBtn.addEventListener("click", closeModal);

    claimBtn.addEventListener("click", async function () {
      if (claimBtn.disabled) return;

      const prize = currentPrizeText;
      const user =
        window.Telegram &&
        window.Telegram.WebApp &&
        window.Telegram.WebApp.initDataUnsafe
          ? window.Telegram.WebApp.initDataUnsafe.user
          : undefined;

      let name = "Анонимный игрок";
      if (user) {
        const full = [user.first_name, user.last_name].filter(Boolean).join(" ").trim();
        if (full) name = full;
        else if (user.username) name = user.username;
      }

      claimBtn.disabled = true;

      let res;
      try {
        res = await fetch("/api/send-prize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, prize }),
        });
      } catch (e) {
        showErr(
          "Ошибка сети: " + (e && e.message ? e.message : "проверьте подключение")
        );
        claimBtn.disabled = false;
        return;
      }

      let data;
      try {
        data = await res.json();
      } catch {
        showErr("Не удалось разобрать ответ сервера.");
        claimBtn.disabled = false;
        return;
      }

      if (!res.ok || !data.success) {
        showErr(
          (data && data.error) || "Не удалось отправить уведомление."
        );
        claimBtn.disabled = false;
        return;
      }

      claimBtn.textContent = "ОТПРАВЛЕНО...";
      claimBtn.disabled = true;
      setTimeout(function () {
        if (tg && typeof tg.close === "function") {
          tg.close();
        }
      }, 1500);
    });

    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(syncCanvasSize).observe(wheelWrap);
    } else {
      window.addEventListener("resize", syncCanvasSize);
    }
    window.addEventListener("orientationchange", function () {
      setTimeout(syncCanvasSize, 200);
    });

    function startCanvas() {
      requestAnimationFrame(syncCanvasSize);
    }
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(startCanvas);
    } else {
      startCanvas();
    }
  </script>
</body>
</html>

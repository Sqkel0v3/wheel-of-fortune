<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Whoosh — Барабан бонусов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --whoosh-bg: #F5F5F7;
      --whoosh-surface: #FFFFFF;
      --whoosh-accent: #FFD500;
      --whoosh-line: #E8E8E8;
      --whoosh-card-border: #E0E0E0;
      --whoosh-text: #000000;
      --whoosh-muted: #666666;
      --whoosh-radius-btn: 12px;
      --whoosh-radius-modal: 16px;
      --drum-item-h: 76px;
      --drum-card-gap: 8px;
      --drum-view-h: calc(var(--drum-item-h) * 3 + var(--drum-card-gap) * 2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100dvh;
    }

    html, body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--whoosh-bg);
      color: var(--whoosh-text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      padding: max(10px, env(safe-area-inset-top, 0px)) 16px max(10px, env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      box-sizing: border-box;
      min-height: 100dvh;
      width: 100%;
      overflow-y: hidden;
    }

    .app {
      width: 100%;
      max-width: 520px;
      min-height: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    header {
      text-align: center;
      width: 100%;
      padding: 0 6px;
      flex-shrink: 0;
    }

    .brand-wordmark {
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.45em;
      color: #000000;
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(0.85rem, 3.8vw, 1.1rem);
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1.35;
      color: #000000;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--whoosh-muted);
      line-height: 1.45;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    .main-stack {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 0;
      width: 100%;
      padding: 8px 0 4px;
    }

    .drum-assembly {
      position: relative;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: min(100%, 380px);
      flex-shrink: 0;
    }

    .drum-viewport {
      position: relative;
      flex: 1;
      min-width: 0;
      height: var(--drum-view-h);
      overflow: hidden;
      background: transparent;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }

    .drum-fade {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 2;
      pointer-events: none;
      height: 48%;
    }

    .drum-fade--top {
      top: 0;
      background: linear-gradient(
        to bottom,
        #000000 0%,
        rgba(0, 0, 0, 0.55) 18%,
        rgba(0, 0, 0, 0.22) 42%,
        rgba(245, 245, 247, 0) 72%,
        transparent 100%
      );
    }

    .drum-fade--bottom {
      bottom: 0;
      background: linear-gradient(
        to top,
        #000000 0%,
        rgba(0, 0, 0, 0.55) 18%,
        rgba(0, 0, 0, 0.22) 42%,
        rgba(245, 245, 247, 0) 72%,
        transparent 100%
      );
    }

    .drum-strip-wrap {
      position: relative;
      z-index: 0;
    }

    .drum-strip {
      will-change: transform;
      display: flex;
      flex-direction: column;
      gap: var(--drum-card-gap);
    }

    .drum-card {
      height: var(--drum-item-h);
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid var(--whoosh-card-border);
      border-radius: 12px;
      background: var(--whoosh-surface);
      box-sizing: border-box;
    }

    .drum-card__icon {
      width: 48px;
      height: 48px;
      background: var(--whoosh-accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 6px;
      overflow: hidden;
    }

    .drum-card__icon .drum-card__logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      pointer-events: none;
    }

    .drum-card__text {
      flex: 1;
      min-width: 0;
      text-align: left;
    }

    .drum-card__big {
      font-size: 1.2rem;
      font-weight: 800;
      color: #000000;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .drum-card__small {
      margin-top: 2px;
      font-size: 0.68rem;
      font-weight: 600;
      color: #444444;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .drum-pointer {
      flex-shrink: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 11px 0 11px 18px;
      border-color: transparent transparent transparent #000000;
      margin-right: 8px;
      filter: drop-shadow(1px 0 0 rgba(0, 0, 0, 0.18));
    }

    @media (max-height: 700px) {
      :root {
        --drum-item-h: 70px;
      }
      .brand-wordmark {
        margin-bottom: 6px;
      }
      .subtitle {
        margin-top: 4px;
        font-size: 0.68rem;
      }
      .main-stack {
        gap: 10px;
        padding: 4px 0 2px;
      }
      .btn-spin {
        padding: 20px 22px;
        font-size: 0.82rem;
      }
    }

    @media (max-height: 620px) {
      :root {
        --drum-item-h: 64px;
      }
      h1 {
        font-size: clamp(0.78rem, 3.5vw, 1rem);
      }
    }

    .btn-spin {
      width: 100%;
      max-width: 520px;
      padding: 26px 28px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--whoosh-radius-btn);
      cursor: pointer;
      color: #000000;
      background: var(--whoosh-accent);
      transition: opacity 0.15s ease;
    }

    .btn-spin:active:not(:disabled) {
      opacity: 0.88;
    }

    .btn-spin.is-waiting {
      opacity: 0.75;
    }

    .btn-spin:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .cooldown-timer {
      width: 100%;
      max-width: 520px;
      padding: 26px 20px;
      font-family: inherit;
      font-size: clamp(0.72rem, 3vw, 0.88rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.35;
      color: #333333;
      background: #E8E8ED;
      border-radius: var(--whoosh-radius-btn);
      border: 1px solid var(--whoosh-line);
      box-sizing: border-box;
    }

    .promo-instruction {
      font-size: clamp(10px, 2.9vw, 12px);
      font-weight: 700;
      color: #000000;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.4;
      max-width: 340px;
      margin: 0;
      padding: 0 10px;
      flex-shrink: 0;
    }

    .staff-hint {
      font-size: clamp(11px, 3.2vw, 13px);
      font-weight: 500;
      color: var(--whoosh-muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      line-height: 1.45;
      max-width: 320px;
      margin: 0;
      padding: 0 10px;
      flex-shrink: 0;
    }

    .modal .staff-hint {
      margin: 0 auto 14px;
      padding: 0 12px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) 20px max(16px, env(safe-area-inset-bottom));
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: 100%;
      max-width: 336px;
      max-height: calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      overflow-y: auto;
      background: var(--whoosh-surface);
      color: #000000;
      border-radius: var(--whoosh-radius-modal);
      padding: 28px 22px 22px;
      border: 1px solid var(--whoosh-line);
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .overlay.is-open .modal {
      opacity: 1;
    }

    .modal-accent {
      width: calc(100% + 44px);
      height: 3px;
      background: var(--whoosh-accent);
      margin: -28px -22px 18px;
    }

    .modal h2 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 14px;
      color: #000000;
    }

    .modal-prize {
      text-align: center;
      font-size: 0.95rem;
      font-weight: 700;
      color: #000000;
      margin-bottom: 10px;
      line-height: 1.4;
      min-height: 1.5em;
    }

    .modal-promo-label {
      text-align: center;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--whoosh-muted);
      margin-bottom: 8px;
    }

    .modal-promo-code {
      text-align: center;
      font-size: clamp(1.35rem, 6.5vw, 1.75rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
      color: #000000;
      margin: 0 0 18px;
      padding: 14px 12px;
      line-height: 1.25;
      background: var(--whoosh-accent);
      border-radius: 12px;
      border: 2px solid #000000;
      word-break: break-all;
    }

    .btn-copy-promo {
      padding: 16px 16px;
      font-family: inherit;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 2px solid #000000;
      border-radius: var(--whoosh-radius-btn);
      cursor: pointer;
      color: #000000;
      background: var(--whoosh-accent);
      transition: opacity 0.15s;
    }

    .btn-copy-promo:active:not(:disabled) {
      opacity: 0.88;
    }

    .btn-copy-promo:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-claim {
      padding: 18px 18px;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid #000000;
      border-radius: var(--whoosh-radius-btn);
      cursor: pointer;
      color: #ffffff;
      background: #000000;
      transition: opacity 0.15s;
    }

    .btn-claim:active:not(:disabled) {
      opacity: 0.85;
    }

    .btn-claim:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      padding: 14px;
      font-family: inherit;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      border: 1px solid var(--whoosh-line);
      border-radius: var(--whoosh-radius-btn);
      cursor: pointer;
      background: var(--whoosh-surface);
      color: var(--whoosh-muted);
    }

  </style>
</head>
<body>
  <div class="app" id="app">
    <header>
      <p class="brand-wordmark">WHOOSH</p>
      <h1>БОНУСЫ WHOOSH</h1>
      <p class="subtitle" id="subtitleLine">Крути барабан и забирай приз</p>
    </header>

    <div class="main-stack">
      <div class="drum-assembly" id="drumAssembly" aria-hidden="true">
        <div class="drum-pointer" aria-hidden="true"></div>
        <div class="drum-viewport" id="drumViewport">
          <div class="drum-fade drum-fade--top" aria-hidden="true"></div>
          <div class="drum-fade drum-fade--bottom" aria-hidden="true"></div>
          <div class="drum-strip-wrap">
            <div class="drum-strip" id="drumStrip"></div>
          </div>
        </div>
      </div>

      <p class="promo-instruction" id="promoInstruction">
        ПРОМОКОД ДЕЙСТВУЕТ 24 ЧАСА ПОСЛЕ АКТИВАЦИИ
      </p>

      <p class="staff-hint" id="staffHintMain">
        ОДИН ШАНС В НЕДЕЛЮ. ХОЧЕШЬ ЕЩЁ? ПРИВЕДИ ДРУГА!
      </p>

      <button type="button" class="btn-spin" id="spinBtn">КРУТИТЬ</button>
      <div class="cooldown-timer" id="cooldownBar" hidden></div>
    </div>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-accent" aria-hidden="true"></div>
      <p class="staff-hint">
        ОДИН ШАНС В НЕДЕЛЮ. ХОЧЕШЬ ЕЩЁ? ПРИВЕДИ ДРУГА!
      </p>
      <h2 id="modalTitle">Поздравляем</h2>
      <p class="modal-prize" id="modalPrize"></p>
      <p class="modal-promo-label" id="modalPromoLabel">Промокод</p>
      <p class="modal-promo-code" id="modalPromoCode" aria-live="polite"></p>
      <div class="modal-actions">
        <button type="button" class="btn-copy-promo" id="copyPromoBtn"></button>
        <button type="button" class="btn-claim" id="claimBtn"></button>
        <button type="button" class="btn-secondary" id="closeModalBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const LS_LAST_SPIN = "whoosh_last_spin";
    const COOLDOWN_MS = 7 * 24 * 60 * 60 * 1000;
    const STRIP_REPEATS = 100;
    const WHOOSH_LOGO_SRC = "/whoosh.png";
    const SPIN_BTN_LABEL = "\u041a\u0420\u0423\u0422\u0418\u0422\u042c";
    const LABEL_COPY_PROMO =
      "\u0421\u041a\u041e\u041f\u0418\u0420\u041e\u0412\u0410\u0422\u042c \u041f\u0420\u041e\u041c\u041e\u041a\u041e\u0414";
    const LABEL_COPIED = "\u0421\u041a\u041e\u041f\u0418\u0420\u041e\u0412\u0410\u041d\u041e";
    const LABEL_GET_PRIZE =
      "\u041f\u041e\u041b\u0423\u0427\u0418\u0422\u042c \u041f\u0420\u0418\u0417";

    let cooldownTickerId = null;

    /**
     * Призы и вероятности (сумма весов = 100).
     * Выбор: случайное число r в [0, 100), приз с наименьшим cum > r по накопленным весам.
     */
    const PRIZE_POOL = [
      { title: "iPhone 16", big: "16", small: "iPhone", weight: 0.01, promoBase: "IPHONE16" },
      { title: "AirPods 4", big: "4", small: "AirPods", weight: 0.05, promoBase: "AIRPODS4" },
      {
        title: "Whoosh Pass на год",
        big: "365",
        small: "дней Pass",
        weight: 0.1,
        promoBase: "PASS_YEAR",
      },
      {
        title: "Whoosh Pass на месяц",
        big: "30",
        small: "дней Pass",
        weight: 1,
        promoBase: "PASS_MONTH",
      },
      { title: "500 бонусов", big: "500", small: "бонусов", weight: 3, promoBase: "WHOOSH500" },
      {
        title: "3 бесплатных старта",
        big: "3",
        small: "бесплатных старта",
        weight: 15,
        promoBase: "START_FREE",
      },
      { title: "100 бонусов", big: "100", small: "бонусов", weight: 35, promoBase: "WHOOSH100" },
      {
        title: "Скидка 10% на поездку",
        big: "10%",
        small: "на поездку",
        weight: 45.84,
        promoBase: "RIDE_OFF10",
      },
    ];

    function pickWeightedPrize() {
      const r = Math.random() * 100;
      let cum = 0;
      for (let i = 0; i < PRIZE_POOL.length; i++) {
        cum += PRIZE_POOL[i].weight;
        if (r < cum) {
          return PRIZE_POOL[i];
        }
      }
      return PRIZE_POOL[PRIZE_POOL.length - 1];
    }

    function cloneEntry(entry) {
      return {
        title: entry.title,
        big: entry.big,
        small: entry.small,
        promoBase: entry.promoBase,
      };
    }

    const PROMO_SUFFIX_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

    function randomPromoSuffix(len) {
      let s = "";
      for (let i = 0; i < len; i++) {
        s += PROMO_SUFFIX_CHARS.charAt(Math.floor(Math.random() * PROMO_SUFFIX_CHARS.length));
      }
      return s;
    }

    function makePromoCode(entry) {
      const base = entry.promoBase || "WHOOSH";
      return base + "-" + randomPromoSuffix(4);
    }

    function renderStripRow(entry) {
      const row = document.createElement("div");
      row.className = "drum-card";
      row.innerHTML =
        '<div class="drum-card__icon" aria-hidden="true">' +
        '<img class="drum-card__logo" src="' +
        WHOOSH_LOGO_SRC +
        '" alt="" width="36" height="36" decoding="async" />' +
        "</div>" +
        '<div class="drum-card__text">' +
        '<div class="drum-card__big"></div>' +
        '<div class="drum-card__small"></div>' +
        "</div>";
      const img = row.querySelector(".drum-card__logo");
      img.addEventListener("error", function () {
        this.remove();
      });
      row.querySelector(".drum-card__big").textContent = entry.big;
      row.querySelector(".drum-card__small").textContent = entry.small;
      row.dataset.prizeTitle = entry.title;
      return row;
    }

    function buildStrip(winnerEntry) {
      const strip = [];
      for (let rep = 0; rep < STRIP_REPEATS; rep++) {
        for (let i = 0; i < PRIZE_POOL.length; i++) {
          strip.push(cloneEntry(PRIZE_POOL[i]));
        }
      }
      strip.push(cloneEntry(winnerEntry));
      return strip;
    }

    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    function isAdmin() {
      return tg?.initDataUnsafe?.user?.id === 821470232;
    }

    const spinSound = new Audio("wheel-of-fortune.mp3");
    spinSound.preload = "auto";
    let spinRafId = null;
    let spinTimeoutId = null;

    function cancelSpinAnimation() {
      if (spinTimeoutId !== null) {
        clearTimeout(spinTimeoutId);
        spinTimeoutId = null;
      }
      if (spinRafId !== null) {
        cancelAnimationFrame(spinRafId);
        spinRafId = null;
      }
    }

    function easeCubicBezier(t, x1, y1, x2, y2) {
      if (t <= 0) return 0;
      if (t >= 1) return 1;
      let lo = 0;
      let hi = 1;
      for (let i = 0; i < 28; i++) {
        const u = (lo + hi) / 2;
        const bx =
          3 * (1 - u) * (1 - u) * u * x1 +
          3 * (1 - u) * u * u * x2 +
          u * u * u;
        if (bx < t) lo = u;
        else hi = u;
      }
      const u = (lo + hi) / 2;
      return (
        3 * (1 - u) * (1 - u) * u * y1 +
        3 * (1 - u) * u * u * y2 +
        u * u * u
      );
    }

    const easeSpin = function (t) {
      return easeCubicBezier(t, 0.2, 0, 0.3, 1);
    };

    function showErr(msg) {
      if (tg && typeof tg.showAlert === "function") {
        tg.showAlert(msg);
      } else {
        alert(msg);
      }
    }

    const drumStrip = document.getElementById("drumStrip");
    const drumViewport = document.getElementById("drumViewport");
    const spinBtn = document.getElementById("spinBtn");
    const overlay = document.getElementById("overlay");
    const modalPrize = document.getElementById("modalPrize");
    const modalPromoCode = document.getElementById("modalPromoCode");
    const copyPromoBtn = document.getElementById("copyPromoBtn");
    const claimBtn = document.getElementById("claimBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const subtitleLine = document.getElementById("subtitleLine");
    const cooldownBar = document.getElementById("cooldownBar");

    copyPromoBtn.textContent = LABEL_COPY_PROMO;
    claimBtn.textContent = LABEL_GET_PRIZE;

    let itemHeightPx = 76;
    let currentPrizeText = "";
    let currentPromoCode = "";
    let spinning = false;

    function readItemHeight() {
      const v = getComputedStyle(document.documentElement).getPropertyValue("--drum-item-h").trim();
      const parsed = parseFloat(v);
      return Number.isFinite(parsed) ? parsed : 76;
    }

    function readStripGapPx() {
      const v = getComputedStyle(document.documentElement).getPropertyValue("--drum-card-gap").trim();
      const parsed = parseFloat(v);
      return Number.isFinite(parsed) ? parsed : 8;
    }

    function getStripMetrics() {
      const itemH = readItemHeight();
      const gap = readStripGapPx();
      return { itemH, gap, step: itemH + gap };
    }

    /** Центр карточки index по вертикали совпадает с центром окна (лента «замерла» с соседями). */
    function translateForCenteredIndex(index, viewH) {
      const { itemH, step } = getStripMetrics();
      const centerY = index * step + itemH / 2;
      return viewH / 2 - centerY;
    }

    function applyStripTransform(y) {
      drumStrip.style.transform = "translateY(" + y + "px)";
    }

    function fillStripFromData(entries) {
      drumStrip.innerHTML = "";
      for (let i = 0; i < entries.length; i++) {
        drumStrip.appendChild(renderStripRow(entries[i]));
      }
    }

    function getCooldownRemainingMs() {
      if (isAdmin()) return 0;
      try {
        const raw = localStorage.getItem(LS_LAST_SPIN);
        if (!raw) return 0;
        const last = parseInt(raw, 10);
        if (!Number.isFinite(last)) return 0;
        const elapsed = Date.now() - last;
        return Math.max(0, COOLDOWN_MS - elapsed);
      } catch (e) {
        return 0;
      }
    }

    function formatCooldown(ms) {
      const sec = Math.ceil(ms / 1000);
      const d = Math.floor(sec / 86400);
      const h = Math.floor((sec % 86400) / 3600);
      const m = Math.floor((sec % 3600) / 60);
      return (
        "\u0421\u041b\u0415\u0414\u0423\u042e\u0429\u0418\u0419 \u0428\u0410\u041d\u0421 \u0427\u0415\u0420\u0415\u0417: " +
        d +
        "\u0434 " +
        h +
        "\u0447 " +
        m +
        "\u043c"
      );
    }

    function stopCooldownTicker() {
      if (cooldownTickerId !== null) {
        clearInterval(cooldownTickerId);
        cooldownTickerId = null;
      }
    }

    function refreshSpinOrTimer() {
      stopCooldownTicker();
      if (!spinBtn || !cooldownBar) return;
      if (isAdmin()) {
        spinBtn.hidden = false;
        cooldownBar.hidden = true;
        spinBtn.disabled = false;
        spinBtn.textContent = SPIN_BTN_LABEL;
        return;
      }
      const left = getCooldownRemainingMs();
      if (left <= 0) {
        spinBtn.hidden = false;
        cooldownBar.hidden = true;
        spinBtn.disabled = false;
        spinBtn.textContent = SPIN_BTN_LABEL;
        return;
      }
      spinBtn.hidden = true;
      cooldownBar.hidden = false;
      function tick() {
        const rem = getCooldownRemainingMs();
        if (rem <= 0) {
          refreshSpinOrTimer();
          return;
        }
        cooldownBar.textContent = formatCooldown(rem);
      }
      tick();
      cooldownTickerId = setInterval(tick, 1000);
    }

    function spin() {
      if (spinning) return;
      if (!isAdmin() && getCooldownRemainingMs() > 0) return;
      cancelSpinAnimation();

      itemHeightPx = readItemHeight();
      const viewH = drumViewport.getBoundingClientRect().height;

      const won = pickWeightedPrize();
      const stripData = buildStrip(won);
      fillStripFromData(stripData);

      const winIndex = stripData.length - 1;
      const yStart = translateForCenteredIndex(0, viewH);
      const yEnd = translateForCenteredIndex(winIndex, viewH);

      applyStripTransform(yStart);

      spinSound.pause();
      spinSound.currentTime = 0;
      spinSound.volume = 1;
      spinSound.play().catch(function () {});

      spinBtn.classList.add("is-waiting");
      spinBtn.disabled = true;
      spinning = true;

      const SPIN_MS = 4500;
      const startTime = performance.now();

      function frame(now) {
        const elapsed = now - startTime;
        const t = Math.min(1, elapsed / SPIN_MS);
        const e = easeSpin(t);
        const y = yStart + (yEnd - yStart) * e;
        applyStripTransform(y);
        if (t < 1) {
          spinRafId = requestAnimationFrame(frame);
        } else {
          spinRafId = null;
          applyStripTransform(yEnd);
        }
      }
      spinRafId = requestAnimationFrame(frame);

      spinTimeoutId = setTimeout(function () {
        spinTimeoutId = null;
        if (spinRafId !== null) {
          cancelAnimationFrame(spinRafId);
          spinRafId = null;
        }
        applyStripTransform(yEnd);
        spinSound.pause();
        spinSound.currentTime = 0;
        currentPrizeText = won.title;
        currentPromoCode = makePromoCode(won);
        spinning = false;
        spinBtn.classList.remove("is-waiting");
        if (!isAdmin()) {
          try {
            localStorage.setItem(LS_LAST_SPIN, String(Date.now()));
          } catch (e) {
            /* ignore */
          }
        }
        refreshSpinOrTimer();
        openModal(currentPrizeText, currentPromoCode);
      }, SPIN_MS);
    }

    function openModal(prize, promoCode) {
      modalPrize.textContent = prize;
      modalPromoCode.textContent = promoCode;
      copyPromoBtn.disabled = false;
      copyPromoBtn.textContent = LABEL_COPY_PROMO;
      claimBtn.textContent = LABEL_GET_PRIZE;
      claimBtn.disabled = false;
      overlay.classList.add("is-open");
    }

    function closeModal() {
      overlay.classList.remove("is-open");
      refreshSpinOrTimer();
    }

    function initSubtitle() {
      if (!subtitleLine) return;
      if (isAdmin()) {
        subtitleLine.textContent = "Админ-режим: доступно бесконечно";
      } else {
        subtitleLine.textContent = "Крути барабан и забирай приз";
      }
    }

    spinBtn.addEventListener("click", spin);
    closeModalBtn.addEventListener("click", closeModal);

    async function copyPromoToClipboard() {
      const text = currentPromoCode || (modalPromoCode && modalPromoCode.textContent) || "";
      if (!text) return;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          ta.setAttribute("readonly", "");
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }
        copyPromoBtn.textContent = LABEL_COPIED;
        setTimeout(function () {
          if (overlay.classList.contains("is-open")) {
            copyPromoBtn.textContent = LABEL_COPY_PROMO;
          }
        }, 2000);
      } catch (e) {
        showErr("Не удалось скопировать. Выделите код вручную.");
      }
    }

    copyPromoBtn.addEventListener("click", function () {
      copyPromoToClipboard();
    });

    claimBtn.addEventListener("click", async function () {
      if (claimBtn.disabled) return;

      const winnerPrizeName = currentPrizeText;
      const promoCode = currentPromoCode;

      claimBtn.disabled = true;

      let res;
      try {
        res = await fetch("/api/send-prize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: tg?.initDataUnsafe?.user?.first_name || "Инкогнито",
            prize: winnerPrizeName,
            promoCode: promoCode,
          }),
        });
      } catch (e) {
        console.log("send-prize fetch error", e);
        alert(
          "Ошибка сети: " + (e && e.message ? e.message : "проверьте подключение")
        );
        claimBtn.disabled = false;
        return;
      }

      let data;
      try {
        data = await res.json();
      } catch (parseErr) {
        console.log("send-prize response (JSON parse failed)", {
          status: res.status,
          error: parseErr,
        });
        alert("Не удалось разобрать ответ сервера.");
        claimBtn.disabled = false;
        return;
      }

      console.log("send-prize response", {
        status: res.status,
        ok: res.ok,
        body: data,
      });

      if (!res.ok || !data.success) {
        alert(
          (data && data.error) || "Запрос не прошёл: " + res.status + " " + res.statusText
        );
        claimBtn.disabled = false;
        return;
      }

      claimBtn.textContent = "Отправлено";
      claimBtn.disabled = true;
      closeModal();

      if (isAdmin()) {
        spinBtn.disabled = false;
        spinBtn.textContent = SPIN_BTN_LABEL;
        spinBtn.classList.remove("is-waiting");
      }

      if (tg && typeof tg.showAlert === "function") {
        tg.showAlert("Приз отправлен!");
      }

      setTimeout(function () {
        if (tg && typeof tg.close === "function" && !isAdmin()) {
          tg.close();
        }
      }, 1200);
    });

    initSubtitle();
    refreshSpinOrTimer();

    window.addEventListener("resize", function () {
      if (!spinning && drumStrip.children.length) {
        itemHeightPx = readItemHeight();
        const viewH = drumViewport.getBoundingClientRect().height;
        const winIndex = drumStrip.children.length - 1;
        applyStripTransform(translateForCenteredIndex(winIndex, viewH));
      }
    });
  </script>
</body>
</html>

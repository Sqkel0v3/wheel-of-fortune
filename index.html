<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Колесо удачи — Золотое Яблоко</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --ga-bg: #000000;
      --ga-accent: #ccff00;
      --ga-sector-alt: #111111;
      --ga-border: #2a2a2a;
      --ga-text: #ffffff;
      --ga-muted: #888888;
      --btn-radius: 4px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      font-family: Inter, Roboto, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background: var(--ga-bg);
      color: var(--ga-text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      padding: max(12px, env(safe-area-inset-top, 0px)) 10px max(24px, env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    header {
      text-align: center;
      width: 100%;
      padding: 0 6px;
    }

    .brand-line {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ga-accent);
      margin-bottom: 6px;
    }

    h1 {
      font-size: clamp(1.25rem, 4.2vw, 1.65rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--ga-text);
    }

    .subtitle {
      margin-top: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ga-muted);
      line-height: 1.45;
    }

    .wheel-wrap {
      position: relative;
      width: min(calc(100vw - 20px), 100%);
      max-width: 100%;
      aspect-ratio: 1;
    }

    .pointer {
      position: absolute;
      left: 50%;
      top: 2px;
      transform: translateX(-50%);
      z-index: 3;
      width: 0;
      height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 18px solid var(--ga-accent);
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.5));
      pointer-events: none;
    }

    #wheel {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .btn-spin {
      width: 100%;
      max-width: 520px;
      padding: 20px 20px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--btn-radius);
      cursor: pointer;
      color: #000000;
      background: var(--ga-accent);
      box-shadow: 0 0 0 2px rgba(204, 255, 0, 0.35), 0 10px 28px rgba(0, 0, 0, 0.5);
      transition: filter 0.15s ease, opacity 0.2s;
    }

    @keyframes btn-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.045); }
    }

    .btn-spin:hover:not(:disabled) {
      animation: btn-pulse 1.15s ease-in-out infinite;
      filter: brightness(1.05);
    }

    .btn-spin.is-waiting {
      animation: btn-pulse 0.95s ease-in-out infinite;
      opacity: 0.92;
    }

    .btn-spin:active:not(:disabled) {
      animation: none;
      transform: scale(0.99);
    }

    .btn-spin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      animation: none;
      transform: none;
    }

    .hint {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--ga-muted);
      text-align: center;
      max-width: 420px;
      line-height: 1.5;
      padding: 0 10px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom));
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: 100%;
      max-width: 340px;
      background: #000000;
      color: var(--ga-text);
      border-radius: var(--btn-radius);
      padding: 26px 20px 20px;
      border: 2px solid var(--ga-accent);
      box-shadow: 0 20px 56px rgba(0, 0, 0, 0.85), 0 0 36px rgba(204, 255, 0, 0.06);
      transform: scale(0.94) translateY(14px);
      transition: transform 0.4s cubic-bezier(0.34, 1.25, 0.64, 1);
    }

    .overlay.is-open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-mark {
      width: 40px;
      height: 3px;
      margin: 0 auto 16px;
      background: var(--ga-accent);
      border-radius: 1px;
    }

    .modal h2 {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .modal-prize {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--ga-accent);
      margin-bottom: 22px;
      line-height: 1.35;
      min-height: 2.5em;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-claim {
      padding: 17px 18px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--btn-radius);
      cursor: pointer;
      color: #000000;
      background: var(--ga-accent);
      box-shadow: 0 0 0 1px rgba(204, 255, 0, 0.4);
      transition: opacity 0.2s, transform 0.12s;
    }

    .btn-claim:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-claim:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-secondary {
      padding: 12px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1px solid var(--ga-border);
      border-radius: var(--btn-radius);
      cursor: pointer;
      background: transparent;
      color: var(--ga-muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <p class="brand-line">Golden Apple</p>
      <h1>Колесо удачи</h1>
      <p class="subtitle">Крутите колесо и заберите подарок в Золотом Яблоке</p>
    </header>

    <div class="wheel-wrap" id="wheelWrap" aria-hidden="true">
      <div class="pointer"></div>
      <canvas id="wheel"></canvas>
    </div>

    <button type="button" class="btn-spin" id="spinBtn">Испытать удачу</button>
    <p class="hint">Один спин — один подарок. Покажите экран сотруднику магазина.</p>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-mark" aria-hidden="true"></div>
      <h2 id="modalTitle">Поздравляем!</h2>
      <p class="modal-prize" id="modalPrize"></p>
      <div class="modal-actions">
        <button type="button" class="btn-claim" id="claimBtn">Получить приз</button>
        <button type="button" class="btn-secondary" id="closeModalBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const BOT_TOKEN = "8392003499:AAG5RkZOn2TPkD75b3rVcsZvXMgny1rW-hA";
    const ADMIN_CHAT_ID = "821470232";

    const PRIZES = [
      "Скидка 5%",
      "100 бонусов",
      "Пробник",
      "Скидка 10%",
      "Маска",
      "Сэмпл",
    ];

    const SECTOR_FILL = ["#000000", "#111111"];
    const ACCENT = "#ccff00";
    const INNER_DIVIDER = "#1f1f1f";

    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    function showErr(msg) {
      if (tg && typeof tg.showAlert === "function") {
        tg.showAlert(msg);
      } else {
        alert(msg);
      }
    }

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const wheelWrap = document.getElementById("wheelWrap");
    const spinBtn = document.getElementById("spinBtn");
    const overlay = document.getElementById("overlay");
    const modalPrize = document.getElementById("modalPrize");
    const claimBtn = document.getElementById("claimBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    const N = PRIZES.length;
    const TAU = Math.PI * 2;
    const sectorAngle = TAU / N;

    let layoutSize = 300;
    let rotation = 0;
    let spinning = false;
    let currentPrizeText = "";

    function syncCanvasSize() {
      const rect = wheelWrap.getBoundingClientRect();
      const w = Math.max(180, Math.floor(rect.width));
      layoutSize = w;
      const dpr = Math.min(window.devicePixelRatio || 1, 3);
      const px = Math.max(1, Math.floor(w * dpr));
      canvas.width = px;
      canvas.height = px;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawWheel();
    }

    function drawWheel() {
      const w = layoutSize;
      const h = layoutSize;
      const cx = w / 2;
      const cy = h / 2;
      const outlineW = Math.max(3, layoutSize * 0.018);
      const r = w / 2 - outlineW / 2 - 2;
      const textInset = Math.max(10, layoutSize * 0.035);

      ctx.clearRect(0, 0, w, h);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      for (let i = 0; i < N; i++) {
        const start = i * sectorAngle - Math.PI / 2;
        const end = start + sectorAngle;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, start, end);
        ctx.closePath();
        ctx.fillStyle = SECTOR_FILL[i % 2];
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, start, end);
        ctx.closePath();
        ctx.strokeStyle = INNER_DIVIDER;
        ctx.lineWidth = 1;
        ctx.stroke();

        const mid = start + sectorAngle / 2;

        ctx.save();
        ctx.rotate(mid);
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.direction = "ltr";
        ctx.fillStyle = "#CCFF00";

        const hubPad = r * 0.2;
        const textX = r - textInset;
        const maxTextWidth = Math.max(24, textX - hubPad);

        let fontPx = Math.round(Math.min(20, Math.max(18, layoutSize * 0.058)));
        let textLine = PRIZES[i];
        ctx.font = "bold " + fontPx + "px Inter, sans-serif";

        while (ctx.measureText(textLine).width > maxTextWidth && fontPx > 14) {
          fontPx -= 1;
          ctx.font = "bold " + fontPx + "px Inter, sans-serif";
        }
        if (ctx.measureText(textLine).width > maxTextWidth && textLine.length > 1) {
          textLine = textLine.slice(0, -1) + "…";
        }

        ctx.fillText(textLine, textX, 0);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, TAU);
      ctx.strokeStyle = ACCENT;
      ctx.lineWidth = outlineW;
      ctx.stroke();

      ctx.restore();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.13, 0, TAU);
      ctx.fillStyle = "#000000";
      ctx.fill();
      ctx.strokeStyle = ACCENT;
      ctx.lineWidth = Math.max(1.5, layoutSize * 0.008);
      ctx.stroke();
      ctx.restore();
    }

    function easeOutQuint(t) {
      return 1 - Math.pow(1 - t, 5);
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      spinBtn.classList.add("is-waiting");

      const winnerIndex = Math.floor(Math.random() * N);
      const fullSpins = 10 + Math.floor(Math.random() * 5);
      const duration = 7500 + Math.random() * 2000;

      const localCenter =
        winnerIndex * sectorAngle + sectorAngle / 2 - Math.PI / 2;
      const pointerAngle = (3 * Math.PI) / 2;
      let delta = pointerAngle - localCenter - rotation;
      while (delta <= 0) delta += TAU;
      const targetRotation = rotation + fullSpins * TAU + delta;

      const startRot = rotation;
      const startTime = performance.now();

      function frame(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const e = easeOutQuint(t);
        rotation = startRot + (targetRotation - startRot) * e;
        drawWheel();
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          rotation = targetRotation;
          drawWheel();
          currentPrizeText = PRIZES[winnerIndex];
          spinning = false;
          spinBtn.disabled = false;
          spinBtn.classList.remove("is-waiting");
          openModal(currentPrizeText);
        }
      }
      requestAnimationFrame(frame);
    }

    function openModal(prize) {
      modalPrize.textContent = prize;
      claimBtn.textContent = "Получить приз";
      claimBtn.disabled = false;
      overlay.classList.add("is-open");
    }

    function closeModal() {
      overlay.classList.remove("is-open");
    }

    spinBtn.addEventListener("click", spin);
    closeModalBtn.addEventListener("click", closeModal);

    claimBtn.addEventListener("click", async function () {
      if (claimBtn.disabled) return;

      const prize = currentPrizeText;
      const user =
        window.Telegram &&
        window.Telegram.WebApp &&
        window.Telegram.WebApp.initDataUnsafe
          ? window.Telegram.WebApp.initDataUnsafe.user
          : undefined;

      let userName = "Анонимный игрок";
      if (user) {
        const full = [user.first_name, user.last_name].filter(Boolean).join(" ").trim();
        if (full) userName = full;
        else if (user.username) userName = user.username;
      }

      const text =
        "\uD83C\uDF81 Новый победитель! \nИмя: " + userName + " \nПриз: " + prize;

      const url = "https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage";

      claimBtn.disabled = true;

      let data;
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: ADMIN_CHAT_ID,
            text: text,
          }),
        });
        try {
          data = await res.json();
        } catch {
          showErr("Не удалось разобрать ответ сервера.");
          claimBtn.disabled = false;
          return;
        }
      } catch (e) {
        showErr(
          "Ошибка сети: " + (e && e.message ? e.message : "проверьте подключение")
        );
        claimBtn.disabled = false;
        return;
      }

      if (!data.ok) {
        showErr(data.description || "Не удалось отправить уведомление.");
        claimBtn.disabled = false;
        return;
      }

      claimBtn.textContent = "ОТПРАВЛЕНО...";
      claimBtn.disabled = true;
      setTimeout(function () {
        if (tg && typeof tg.close === "function") {
          tg.close();
        }
      }, 2000);
    });

    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(syncCanvasSize).observe(wheelWrap);
    } else {
      window.addEventListener("resize", syncCanvasSize);
    }
    window.addEventListener("orientationchange", function () {
      setTimeout(syncCanvasSize, 200);
    });

    function startCanvas() {
      requestAnimationFrame(syncCanvasSize);
    }
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(startCanvas);
    } else {
      startCanvas();
    }
  </script>
</body>
</html>

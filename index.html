<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Колесо удачи — Золотое Яблоко</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --ga-bg: #ffffff;
      --ga-accent: #ccff00;
      --ga-sector-a: #ffffff;
      --ga-sector-b: #f5f5f5;
      --ga-line: #eeeeee;
      --ga-text: #000000;
      --ga-muted: #666666;
      --btn-radius: 2px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--ga-bg);
      color: var(--ga-text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      padding: max(20px, env(safe-area-inset-top, 0px)) 20px max(28px, env(safe-area-inset-bottom, 0px));
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    header {
      text-align: center;
      width: 100%;
      padding: 8px 12px 0;
    }

    .brand-line {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--ga-text);
      margin-bottom: 14px;
      opacity: 0.85;
    }

    h1 {
      font-size: clamp(1.05rem, 3.8vw, 1.35rem);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      line-height: 1.5;
      color: var(--ga-text);
    }

    .subtitle {
      margin-top: 16px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--ga-muted);
      line-height: 1.65;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    .wheel-wrap {
      position: relative;
      width: min(calc(100vw - 40px), 100%);
      max-width: 100%;
      aspect-ratio: 1;
    }

    .pointer {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      z-index: 3;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 16px solid var(--ga-accent);
      pointer-events: none;
    }

    #wheel {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .btn-spin {
      width: 100%;
      max-width: 520px;
      padding: 22px 24px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--btn-radius);
      cursor: pointer;
      color: #000000;
      background: var(--ga-accent);
      transition: transform 0.15s ease, opacity 0.2s;
    }

    @keyframes btn-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .btn-spin:hover:not(:disabled) {
      animation: btn-pulse 1.2s ease-in-out infinite;
    }

    .btn-spin.is-waiting {
      animation: btn-pulse 1s ease-in-out infinite;
      opacity: 0.88;
    }

    .btn-spin:active:not(:disabled) {
      animation: none;
      transform: scale(0.995);
    }

    .btn-spin:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      animation: none;
    }

    .hint {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--ga-muted);
      text-align: center;
      max-width: 360px;
      line-height: 1.65;
      padding: 0 8px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(20px, env(safe-area-inset-top)) 24px max(20px, env(safe-area-inset-bottom));
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: 100%;
      max-width: 340px;
      background: #ffffff;
      color: var(--ga-text);
      border-radius: var(--btn-radius);
      padding: 36px 28px 28px;
      border: 1px solid var(--ga-accent);
      box-shadow: none;
      transform: translateY(12px);
      opacity: 0.96;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .overlay.is-open .modal {
      transform: translateY(0);
      opacity: 1;
    }

    .modal-mark {
      width: 32px;
      height: 2px;
      margin: 0 auto 20px;
      background: var(--ga-accent);
    }

    .modal h2 {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 16px;
      color: var(--ga-text);
    }

    .modal-prize {
      text-align: center;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--ga-text);
      margin-bottom: 28px;
      line-height: 1.4;
      min-height: 2.4em;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-claim {
      padding: 18px 20px;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--btn-radius);
      cursor: pointer;
      color: #000000;
      background: var(--ga-accent);
      transition: opacity 0.2s, transform 0.12s;
    }

    .btn-claim:active:not(:disabled) {
      transform: scale(0.99);
    }

    .btn-claim:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-secondary {
      padding: 14px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      border: 1px solid var(--ga-line);
      border-radius: var(--btn-radius);
      cursor: pointer;
      background: transparent;
      color: var(--ga-muted);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <p class="brand-line">Golden Apple</p>
      <h1>Колесо удачи</h1>
      <p class="subtitle">Крутите колесо и заберите подарок в Золотом Яблоке</p>
    </header>

    <div class="wheel-wrap" id="wheelWrap" aria-hidden="true">
      <div class="pointer"></div>
      <canvas id="wheel"></canvas>
    </div>

    <button type="button" class="btn-spin" id="spinBtn">Испытать удачу</button>
    <p class="hint">Один спин — один подарок. Покажите экран сотруднику магазина.</p>
  </div>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-mark" aria-hidden="true"></div>
      <h2 id="modalTitle">Поздравляем</h2>
      <p class="modal-prize" id="modalPrize"></p>
      <div class="modal-actions">
        <button type="button" class="btn-claim" id="claimBtn">Получить приз</button>
        <button type="button" class="btn-secondary" id="closeModalBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const BOT_TOKEN = "8392003499:AAG5RkZOn2TPkD75b3rVcsZvXMgny1rW-hA";
    const ADMIN_CHAT_ID = "821470232";

    const PRIZES = [
      "Скидка 5%",
      "100 бонусов",
      "Пробник",
      "Скидка 10%",
      "Маска",
      "Сэмпл",
    ];

    const SECTOR_FILL = ["#ffffff", "#f5f5f5"];
    const WHEEL_STROKE = "#eeeeee";
    const INNER_LINE = "#eeeeee";
    const LABEL_COLOR = "#000000";

    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    function showErr(msg) {
      if (tg && typeof tg.showAlert === "function") {
        tg.showAlert(msg);
      } else {
        alert(msg);
      }
    }

    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const wheelWrap = document.getElementById("wheelWrap");
    const spinBtn = document.getElementById("spinBtn");
    const overlay = document.getElementById("overlay");
    const modalPrize = document.getElementById("modalPrize");
    const claimBtn = document.getElementById("claimBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    const N = PRIZES.length;
    const TAU = Math.PI * 2;
    const sectorAngle = TAU / N;

    let layoutSize = 300;
    let rotation = 0;
    let spinning = false;
    let currentPrizeText = "";

    function syncCanvasSize() {
      const rect = wheelWrap.getBoundingClientRect();
      const w = Math.max(180, Math.floor(rect.width));
      layoutSize = w;
      const dpr = Math.min(window.devicePixelRatio || 1, 3);
      const px = Math.max(1, Math.floor(w * dpr));
      canvas.width = px;
      canvas.height = px;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawWheel();
    }

    function drawWheel() {
      const w = layoutSize;
      const cx = w / 2;
      const cy = w / 2;
      const outlineW = Math.max(1, Math.min(1.5, layoutSize * 0.004));
      const r = w / 2 - outlineW - 1;

      const radialT = 0.65;
      const textRadius = r * radialT;
      const maxTextWidth =
        2 * textRadius * Math.sin(sectorAngle * 0.42) - 8;

      ctx.clearRect(0, 0, w, w);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);

      for (let i = 0; i < N; i++) {
        const start = i * sectorAngle - Math.PI / 2;
        const end = start + sectorAngle;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, start, end);
        ctx.closePath();
        ctx.fillStyle = SECTOR_FILL[i % 2];
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, start, end);
        ctx.closePath();
        ctx.strokeStyle = INNER_LINE;
        ctx.lineWidth = 1;
        ctx.stroke();

        const mid = start + sectorAngle / 2;

        ctx.save();
        ctx.rotate(mid);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.direction = "ltr";
        ctx.fillStyle = LABEL_COLOR;
        ctx.font = "bold 16px Inter, sans-serif";

        let textLine = PRIZES[i];
        if (ctx.measureText(textLine).width > maxTextWidth) {
          while (
            textLine.length > 1 &&
            ctx.measureText(textLine.slice(0, -1) + "…").width > maxTextWidth
          ) {
            textLine = textLine.slice(0, -1);
          }
          textLine = textLine.slice(0, -1) + "…";
        }

        ctx.fillText(textLine, textRadius, 0);
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, TAU);
      ctx.strokeStyle = WHEEL_STROKE;
      ctx.lineWidth = outlineW;
      ctx.stroke();

      ctx.restore();

      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.12, 0, TAU);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
      ctx.strokeStyle = WHEEL_STROKE;
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    function easeOutQuint(t) {
      return 1 - Math.pow(1 - t, 5);
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      spinBtn.classList.add("is-waiting");

      const winnerIndex = Math.floor(Math.random() * N);
      const fullSpins = 10 + Math.floor(Math.random() * 5);
      const duration = 7500 + Math.random() * 2000;

      const localCenter =
        winnerIndex * sectorAngle + sectorAngle / 2 - Math.PI / 2;
      const pointerAngle = (3 * Math.PI) / 2;
      let delta = pointerAngle - localCenter - rotation;
      while (delta <= 0) delta += TAU;
      const targetRotation = rotation + fullSpins * TAU + delta;

      const startRot = rotation;
      const startTime = performance.now();

      function frame(now) {
        const t = Math.min(1, (now - startTime) / duration);
        const e = easeOutQuint(t);
        rotation = startRot + (targetRotation - startRot) * e;
        drawWheel();
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          rotation = targetRotation;
          drawWheel();
          currentPrizeText = PRIZES[winnerIndex];
          spinning = false;
          spinBtn.disabled = false;
          spinBtn.classList.remove("is-waiting");
          openModal(currentPrizeText);
        }
      }
      requestAnimationFrame(frame);
    }

    function openModal(prize) {
      modalPrize.textContent = prize;
      claimBtn.textContent = "Получить приз";
      claimBtn.disabled = false;
      overlay.classList.add("is-open");
    }

    function closeModal() {
      overlay.classList.remove("is-open");
    }

    spinBtn.addEventListener("click", spin);
    closeModalBtn.addEventListener("click", closeModal);

    claimBtn.addEventListener("click", async function () {
      if (claimBtn.disabled) return;

      const prize = currentPrizeText;
      const user =
        window.Telegram &&
        window.Telegram.WebApp &&
        window.Telegram.WebApp.initDataUnsafe
          ? window.Telegram.WebApp.initDataUnsafe.user
          : undefined;

      let userName = "Анонимный игрок";
      if (user) {
        const full = [user.first_name, user.last_name].filter(Boolean).join(" ").trim();
        if (full) userName = full;
        else if (user.username) userName = user.username;
      }

      const text =
        "\uD83C\uDF81 Новый победитель! \nИмя: " + userName + " \nПриз: " + prize;

      const url = "https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage";

      claimBtn.disabled = true;

      let data;
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: ADMIN_CHAT_ID,
            text: text,
          }),
        });
        try {
          data = await res.json();
        } catch {
          showErr("Не удалось разобрать ответ сервера.");
          claimBtn.disabled = false;
          return;
        }
      } catch (e) {
        showErr(
          "Ошибка сети: " + (e && e.message ? e.message : "проверьте подключение")
        );
        claimBtn.disabled = false;
        return;
      }

      if (!data.ok) {
        showErr(data.description || "Не удалось отправить уведомление.");
        claimBtn.disabled = false;
        return;
      }

      claimBtn.textContent = "ОТПРАВЛЕНО...";
      claimBtn.disabled = true;
      setTimeout(function () {
        if (tg && typeof tg.close === "function") {
          tg.close();
        }
      }, 2000);
    });

    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(syncCanvasSize).observe(wheelWrap);
    } else {
      window.addEventListener("resize", syncCanvasSize);
    }
    window.addEventListener("orientationchange", function () {
      setTimeout(syncCanvasSize, 200);
    });

    function startCanvas() {
      requestAnimationFrame(syncCanvasSize);
    }
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(startCanvas);
    } else {
      startCanvas();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Whoosh — Лояльность</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --whoosh-bg: #f5f5f7;
      --whoosh-surface: #ffffff;
      --whoosh-accent: #ffd500;
      --whoosh-text: #000000;
      --whoosh-muted: #666666;
      --whoosh-radius-btn: 12px;
      --whoosh-radius-modal: 16px;
      --drum-item-h: 76px;
      --drum-card-gap: 8px;
      --drum-view-h: calc(3 * var(--drum-item-h) + 2 * var(--drum-card-gap));
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { min-height: 100dvh; }

    html, body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      min-height: 100dvh;
      width: 100%;
      color: var(--whoosh-text);
      background: var(--whoosh-bg);
    }

    body.auth-mode {
      background: #ffffff;
    }

    .screen { display: none; }
    .screen.is-active { display: flex; }

    /* ——— Авторизация ——— */
    .auth-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px 20px;
      width: 100%;
      background: #ffffff;
    }

    .auth-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin-bottom: 28px;
    }

    .auth-title {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #000000;
    }

    .auth-sub {
      font-size: 0.72rem;
      color: var(--whoosh-muted);
      margin-bottom: 32px;
      text-align: center;
      max-width: 280px;
      line-height: 1.45;
    }

    .auth-field-label {
      align-self: stretch;
      max-width: 340px;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #000000;
    }

    .auth-input {
      width: 100%;
      max-width: 340px;
      padding: 16px 18px;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: 2px solid #000000;
      border-radius: var(--whoosh-radius-btn);
      background: #ffffff;
      color: #000000;
      margin-bottom: 20px;
    }

    .auth-input::placeholder {
      color: #999999;
      font-weight: 500;
    }

    .auth-input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 213, 0, 0.65);
    }

    .btn-auth-enter {
      width: 100%;
      max-width: 340px;
      padding: 18px 24px;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--whoosh-radius-btn);
      background: var(--whoosh-accent);
      color: #000000;
      cursor: pointer;
    }

    .btn-auth-enter:active {
      opacity: 0.9;
    }

    .btn-auth-enter:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* ——— Загрузка ——— */
    .boot-loading {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      padding: 24px;
    }

    .boot-loading.is-visible {
      display: flex;
    }

    .boot-loading__spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #eeeeee;
      border-top-color: #000000;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      margin-bottom: 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .boot-loading__text {
      font-size: 0.88rem;
      font-weight: 600;
      color: #000000;
      text-align: center;
      max-width: 280px;
      line-height: 1.45;
    }

    /* ——— Главный экран ——— */
    .app {
      width: 100%;
      max-width: 520px;
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: max(10px, env(safe-area-inset-top, 0px)) 16px max(10px, env(safe-area-inset-bottom, 0px));
    }

    header {
      text-align: center;
      width: 100%;
      padding: 0 6px;
      flex-shrink: 0;
    }

    .brand-wordmark {
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.45em;
      color: #000000;
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(0.85rem, 3.8vw, 1.05rem);
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1.35;
      color: #000000;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--whoosh-muted);
      line-height: 1.45;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    .main-stack {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 0;
      width: 100%;
      padding: 8px 0 4px;
    }

    .km-block {
      width: 100%;
      max-width: min(100%, 380px);
      flex-shrink: 0;
    }

    .km-block__label {
      font-size: clamp(0.68rem, 2.9vw, 0.82rem);
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      color: #000000;
      margin-bottom: 8px;
      line-height: 1.35;
    }

    .km-block__track {
      height: 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }

    .km-block__fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: var(--whoosh-accent);
      transition: width 0.35s ease;
    }

    .drum-assembly {
      position: relative;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: min(100%, 380px);
      flex-shrink: 0;
    }

    .drum-viewport {
      position: relative;
      flex: 1;
      min-width: 0;
      height: var(--drum-view-h);
      overflow: hidden;
      background: transparent;
    }

    .drum-fade {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 2;
      pointer-events: none;
      height: 44%;
    }

    .drum-fade--top {
      top: 0;
      background: linear-gradient(to bottom, rgba(245, 245, 247, 1) 0%, rgba(245, 245, 247, 0) 100%);
    }

    .drum-fade--bottom {
      bottom: 0;
      background: linear-gradient(to top, rgba(245, 245, 247, 1) 0%, rgba(245, 245, 247, 0) 100%);
    }

    .drum-strip {
      will-change: transform;
      display: flex;
      flex-direction: column;
      gap: var(--drum-card-gap);
    }

    .drum-card {
      height: var(--drum-item-h);
      flex-shrink: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: #ffffff;
      border: none;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.06);
    }

    .drum-card__icon {
      width: 48px;
      height: 48px;
      background: var(--whoosh-accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 6px;
      overflow: hidden;
    }

    .drum-card__logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .drum-card__big {
      font-size: 1.15rem;
      font-weight: 800;
      color: #000000;
      line-height: 1.15;
    }

    .drum-card__small {
      margin-top: 2px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #444444;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .drum-pointer {
      flex-shrink: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 11px 0 11px 18px;
      border-color: transparent transparent transparent #000000;
      margin-right: 8px;
    }

    .hint {
      font-size: clamp(10px, 2.9vw, 12px);
      font-weight: 600;
      color: var(--whoosh-muted);
      text-align: center;
      letter-spacing: 0.06em;
      line-height: 1.4;
      max-width: 340px;
      padding: 0 8px;
    }

    .admin-km-panel {
      width: 100%;
      max-width: 520px;
      display: flex;
      justify-content: center;
      margin-top: 4px;
    }

    .btn-admin-km {
      padding: 8px 18px;
      font-family: inherit;
      font-size: 0.58rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid #000000;
      border-radius: 999px;
      cursor: pointer;
      color: #000000;
      background: rgba(255, 213, 0, 0.65);
    }

    .btn-spin {
      width: 100%;
      max-width: 520px;
      padding: 24px 20px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--whoosh-radius-btn);
      cursor: pointer;
      color: #000000;
      background: var(--whoosh-accent);
    }

    .btn-spin:disabled:not(.is-waiting) {
      background: #d1d1d6;
      color: #3a3a3c;
      cursor: not-allowed;
      font-size: clamp(0.58rem, 2.8vw, 0.75rem);
    }

    .btn-spin.is-waiting {
      opacity: 0.8;
    }

    .btn-spin:disabled.is-waiting {
      background: var(--whoosh-accent);
      color: #000000;
    }

    .btn-spin--long {
      font-size: clamp(0.5rem, 3vw, 0.7rem);
      letter-spacing: 0.07em;
      padding: 20px 12px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) 20px max(16px, env(safe-area-inset-bottom));
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      width: 100%;
      max-width: 336px;
      background: #ffffff;
      color: #000000;
      border-radius: var(--whoosh-radius-modal);
      padding: 24px 20px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }

    .modal h2 {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 12px;
    }

    .modal-prize {
      text-align: center;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .modal-promo-label {
      text-align: center;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--whoosh-muted);
      margin-bottom: 6px;
    }

    .modal-promo-code {
      text-align: center;
      font-size: clamp(1.2rem, 6vw, 1.6rem);
      font-weight: 800;
      margin: 0 0 16px;
      padding: 12px;
      background: var(--whoosh-accent);
      border-radius: 12px;
      word-break: break-all;
    }

    .modal-physical-notice {
      text-align: center;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-contact-tg {
      display: block;
      width: 100%;
      padding: 14px;
      font-family: inherit;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border-radius: var(--whoosh-radius-btn);
      background: var(--whoosh-accent);
      color: #000000;
    }

    .btn-copy-promo {
      padding: 14px;
      font-family: inherit;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--whoosh-radius-btn);
      background: var(--whoosh-accent);
      color: #000000;
      cursor: pointer;
    }

    .btn-claim {
      padding: 16px;
      font-family: inherit;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--whoosh-radius-btn);
      background: #000000;
      color: #ffffff;
      cursor: pointer;
    }

    .btn-secondary {
      padding: 12px;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      border: 1px solid #e0e0e0;
      border-radius: var(--whoosh-radius-btn);
      background: #ffffff;
      color: var(--whoosh-muted);
      cursor: pointer;
    }

    @media (max-height: 700px) {
      :root { --drum-item-h: 70px; }
    }
  </style>
</head>
<body>
  <div class="boot-loading" id="bootLoading" aria-live="polite">
    <div class="boot-loading__spinner" aria-hidden="true"></div>
    <p class="boot-loading__text">Подключение к серверам Whoosh...</p>
  </div>

  <div class="screen auth-screen" id="authScreen" hidden>
    <img class="auth-logo" src="/whoosh.png" alt="Whoosh" width="72" height="72" />
    <p class="auth-title">WHOOSH</p>
    <p class="auth-sub">Войдите по номеру телефона, чтобы открыть барабан бонусов</p>
    <label class="auth-field-label" for="phoneInput">Телефон</label>
    <input
      class="auth-input"
      id="phoneInput"
      type="tel"
      inputmode="tel"
      autocomplete="tel"
      placeholder="+7 (999) 000-00-00"
    />
    <button type="button" class="btn-auth-enter" id="authEnterBtn">ВОЙТИ</button>
  </div>

  <div class="app" id="mainApp" hidden>
    <header>
      <p class="brand-wordmark">WHOOSH</p>
      <h1>БОНУСЫ WHOOSH</h1>
      <p class="subtitle" id="subtitleLine"></p>
    </header>

    <div class="main-stack">
      <div class="km-block" id="kmBlock">
        <p class="km-block__label" id="kmBlockLabel">Ваш пробег: 0 км</p>
        <div class="km-block__track" aria-hidden="true">
          <div class="km-block__fill" id="kmBlockFill"></div>
        </div>
      </div>

      <div class="drum-assembly" id="drumAssembly">
        <div class="drum-pointer" aria-hidden="true"></div>
        <div class="drum-viewport" id="drumViewport">
          <div class="drum-fade drum-fade--top" aria-hidden="true"></div>
          <div class="drum-fade drum-fade--bottom" aria-hidden="true"></div>
          <div class="drum-strip" id="drumStrip"></div>
        </div>
      </div>

      <p class="hint" id="hintLine">
        Первый прокрут бесплатно. Далее — 250 км с баланса.
      </p>

      <button type="button" class="btn-spin" id="spinBtn">КРУТИТЬ</button>
    </div>
  </div>

  <div class="overlay" id="prizeOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 id="modalTitle">Поздравляем</h2>
      <p class="modal-prize" id="modalPrize"></p>
      <p class="modal-physical-notice" id="modalPhysicalNotice" hidden></p>
      <p class="modal-promo-label" id="modalPromoLabel">Промокод</p>
      <p class="modal-promo-code" id="modalPromoCode" aria-live="polite"></p>
      <div class="modal-actions">
        <a class="btn-contact-tg" id="contactTgBtn" href="https://t.me/graceqqq" rel="noopener noreferrer" hidden>СВЯЗАТЬСЯ</a>
        <button type="button" class="btn-copy-promo" id="copyPromoBtn"></button>
        <button type="button" class="btn-claim" id="claimBtn"></button>
        <button type="button" class="btn-secondary" id="closeModalBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const KM_TARGET = 250;
    const STRIP_POOL_REPEATS = 100;
    const PHYSICAL_PRIZE_CHAT_URL = "https://t.me/graceqqq";
    const DEMO_ADMIN_IDS = [821470232, 1106885262];

    const WHOOSH_LOGO_SRC = "/whoosh.png";
    const LABEL_COPY_PROMO = "\u0421\u041a\u041e\u041f\u0418\u0420\u041e\u0412\u0410\u0422\u042c \u041f\u0420\u041e\u041c\u041e\u041a\u041e\u0414";
    const LABEL_COPIED = "\u0421\u041a\u041e\u041f\u0418\u0420\u041e\u0412\u0410\u041d\u041e";
    const LABEL_CLAIM = "\u0417\u0410\u0411\u0420\u0410\u0422\u042c \u041f\u0420\u0418\u0417";
    const LABEL_CONTACT = "\u0421\u0412\u042f\u0417\u0410\u0422\u042c\u0421\u042f";
    const LABEL_SPIN = "\u041a\u0420\u0423\u0422\u0418\u0422\u042c";
    const LABEL_FREE_SPIN =
      "\u0411\u0415\u0421\u041f\u041b\u0410\u0422\u041d\u0410\u042f \u041f\u0420\u041e\u041a\u0420\u0423\u0422\u041a\u0410";

    const PRIZE_POOL = [
      { title: "iPhone 16", big: "16", small: "iPhone", weight: 0.01 },
      { title: "AirPods 4", big: "4", small: "AirPods", weight: 0.05 },
      { title: "Whoosh Pass на год", big: "365", small: "дней Pass", weight: 0.1, promoSlug: "365" },
      { title: "Whoosh Pass на месяц", big: "30", small: "дней Pass", weight: 1, promoSlug: "30" },
      { title: "500 бонусов", big: "500", small: "бонусов", weight: 3, promoSlug: "500" },
      { title: "3 бесплатных старта", big: "3", small: "бесплатных старта", weight: 15, promoSlug: "START3" },
      { title: "100 бонусов", big: "100", small: "бонусов", weight: 35, promoSlug: "100" },
      { title: "Скидка 10% на поездку", big: "10%", small: "на поездку", weight: 45.84, promoSlug: "RIDE10" },
    ];

    const PROMO_RND = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

    function pickWeightedPrize() {
      const r = Math.random() * 100;
      let cum = 0;
      for (let i = 0; i < PRIZE_POOL.length; i++) {
        cum += PRIZE_POOL[i].weight;
        if (r < cum) return PRIZE_POOL[i];
      }
      return PRIZE_POOL[PRIZE_POOL.length - 1];
    }

    function cloneEntry(entry) {
      return {
        title: entry.title,
        big: entry.big,
        small: entry.small,
        promoSlug: entry.promoSlug,
      };
    }

    function isPhysicalPrize(entry) {
      const t = entry && entry.title;
      return t === "iPhone 16" || t === "AirPods 4";
    }

    function generatePromo(prefix) {
      let mid = String(prefix || "BONUS").replace(/[^A-Za-z0-9]/g, "").toUpperCase() || "BONUS";
      mid = mid.slice(0, 3);
      while (mid.length < 3) {
        mid += PROMO_RND.charAt(Math.floor(Math.random() * PROMO_RND.length));
      }
      let tail = "";
      for (let i = 0; i < 4; i++) {
        tail += PROMO_RND.charAt(Math.floor(Math.random() * PROMO_RND.length));
      }
      return "WHOOSH-" + mid + "-" + tail;
    }

    function promoForEntry(entry) {
      if (isPhysicalPrize(entry)) return "";
      return generatePromo(entry.promoSlug || "BONUS");
    }

    function buildStrip(winnerEntry) {
      const strip = [];
      for (let rep = 0; rep < STRIP_POOL_REPEATS; rep++) {
        for (let i = 0; i < PRIZE_POOL.length; i++) {
          strip.push(cloneEntry(PRIZE_POOL[i]));
        }
      }
      strip.push(cloneEntry(winnerEntry));
      return strip;
    }

    const tg = window.Telegram && window.Telegram.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    function getTelegramUserId() {
      const u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
      if (u && u.id != null) return u.id;
      try {
        const q = new URLSearchParams(window.location.search).get("telegramId");
        if (q) {
          const n = Number(q);
          if (Number.isFinite(n)) return n;
        }
      } catch (e) {}
      return null;
    }

    function isDemoAdmin() {
      const id = getTelegramUserId();
      return id != null && DEMO_ADMIN_IDS.some(function (x) { return x == id; });
    }

    let sessionUser = null;
    let spinning = false;
    let currentPrizeText = "";
    let currentPromoCode = "";
    let currentIsPhysical = false;
    let spinRafId = null;
    let spinTimeoutId = null;

    const bootLoading = document.getElementById("bootLoading");
    const authScreen = document.getElementById("authScreen");
    const mainApp = document.getElementById("mainApp");
    const phoneInput = document.getElementById("phoneInput");
    const authEnterBtn = document.getElementById("authEnterBtn");
    const subtitleLine = document.getElementById("subtitleLine");
    const kmBlockLabel = document.getElementById("kmBlockLabel");
    const kmBlockFill = document.getElementById("kmBlockFill");
    const spinBtn = document.getElementById("spinBtn");
    const drumStrip = document.getElementById("drumStrip");
    const drumViewport = document.getElementById("drumViewport");
    const prizeOverlay = document.getElementById("prizeOverlay");
    const modalPrize = document.getElementById("modalPrize");
    const modalPhysicalNotice = document.getElementById("modalPhysicalNotice");
    const modalPromoLabel = document.getElementById("modalPromoLabel");
    const modalPromoCode = document.getElementById("modalPromoCode");
    const contactTgBtn = document.getElementById("contactTgBtn");
    const copyPromoBtn = document.getElementById("copyPromoBtn");
    const claimBtn = document.getElementById("claimBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    copyPromoBtn.textContent = LABEL_COPY_PROMO;
    claimBtn.textContent = LABEL_CLAIM;
    contactTgBtn.textContent = LABEL_CONTACT;
    contactTgBtn.href = PHYSICAL_PRIZE_CHAT_URL;

    function showBootLoading(on) {
      bootLoading.classList.toggle("is-visible", !!on);
    }

    function setBodyAuthMode(on) {
      document.body.classList.toggle("auth-mode", !!on);
    }

    function showAuthOnly() {
      authScreen.hidden = false;
      authScreen.classList.add("is-active");
      mainApp.hidden = true;
      setBodyAuthMode(true);
    }

    function showMainOnly() {
      authScreen.hidden = true;
      authScreen.classList.remove("is-active");
      mainApp.hidden = false;
      setBodyAuthMode(false);
      injectDemoAdminPanel();
    }

    function injectDemoAdminPanel() {
      if (!isDemoAdmin() || document.getElementById("demoKmPanel")) return;
      const panel = document.createElement("div");
      panel.className = "admin-km-panel";
      panel.id = "demoKmPanel";
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "btn-admin-km";
      btn.textContent = "+50 \u041a\u041c";
      btn.addEventListener("click", async function () {
        const tid = getTelegramUserId();
        try {
          const res = await fetch("/api/add-demo-km", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ telegramId: tid }),
          });
          const data = await res.json().catch(function () { return {}; });
          if (res.ok && data.mileage != null) {
            sessionUser.mileage = data.mileage;
            refreshUi();
          } else {
            showErr((data && data.error) || "\u041e\u0448\u0438\u0431\u043a\u0430");
          }
        } catch (e) {
          showErr("\u0421\u0435\u0442\u044c");
        }
      });
      panel.appendChild(btn);
      spinBtn.insertAdjacentElement("afterend", panel);
    }

    function showErr(msg) {
      if (tg && typeof tg.showAlert === "function") tg.showAlert(msg);
      else alert(msg);
    }

    async function apiMe() {
      const tid = getTelegramUserId();
      const res = await fetch("/api/me?telegramId=" + encodeURIComponent(String(tid)));
      if (res.status === 404) return null;
      if (!res.ok) throw new Error("me");
      return res.json();
    }

    function refreshUi() {
      if (!sessionUser) return;
      const km = Number(sessionUser.mileage) || 0;
      kmBlockLabel.textContent =
        "\u0412\u0430\u0448 \u043f\u0440\u043e\u0431\u0435\u0433: " + Math.floor(km) + " \u043a\u043c";
      const pct = Math.min(100, (km / KM_TARGET) * 100);
      kmBlockFill.style.width = pct + "%";

      if (isDemoAdmin()) {
        subtitleLine.textContent =
          "\u0414\u0435\u043c\u043e: +50 \u043a\u043c, \u043f\u0440\u043e\u043a\u0440\u0443\u0442\u043a\u0430 \u0431\u0435\u0437 \u0441\u043f\u0438\u0441\u0430\u043d\u0438\u044f \u0431\u0430\u043b\u0430\u043d\u0441\u0430.";
      } else if (sessionUser.free_spin_available) {
        subtitleLine.textContent =
          "\u041f\u0435\u0440\u0432\u044b\u0439 \u043f\u0440\u043e\u043a\u0440\u0443\u0442 \u2014 \u0431\u0435\u0441\u043f\u043b\u0430\u0442\u043d\u043e.";
      } else {
        subtitleLine.textContent =
          "\u0414\u0430\u043b\u044c\u0448\u0435 \u043a\u0430\u0436\u0434\u044b\u0439 \u0441\u043f\u0438\u043d \u2014 " + KM_TARGET + " \u043a\u043c.";
      }

      if (spinning) return;
      spinBtn.classList.remove("btn-spin--long", "is-waiting");

      if (isDemoAdmin()) {
        spinBtn.disabled = false;
        spinBtn.textContent = LABEL_SPIN;
        return;
      }

      if (sessionUser.free_spin_available) {
        spinBtn.disabled = false;
        spinBtn.textContent = LABEL_FREE_SPIN;
        spinBtn.classList.add("btn-spin--long");
        return;
      }

      if (km >= KM_TARGET) {
        spinBtn.disabled = false;
        spinBtn.textContent = LABEL_SPIN;
        return;
      }

      spinBtn.disabled = true;
      const need = Math.max(0, Math.ceil(KM_TARGET - km));
      spinBtn.textContent =
        "\u041d\u0443\u0436\u043d\u043e \u0435\u0449\u0451 " + need + " \u043a\u043c";
    }

    function readItemHeight() {
      const v = getComputedStyle(document.documentElement).getPropertyValue("--drum-item-h").trim();
      const p = parseFloat(v);
      return Number.isFinite(p) ? p : 76;
    }

    function readStripGapPx() {
      const v = getComputedStyle(document.documentElement).getPropertyValue("--drum-card-gap").trim();
      const p = parseFloat(v);
      return Number.isFinite(p) ? p : 8;
    }

    function translateForCenteredIndex(index, viewH) {
      const itemH = readItemHeight();
      const gap = readStripGapPx();
      const step = itemH + gap;
      const centerY = index * step + itemH / 2;
      return viewH / 2 - centerY;
    }

    function renderStripRow(entry) {
      const row = document.createElement("div");
      row.className = "drum-card";
      row.innerHTML =
        '<div class="drum-card__icon" aria-hidden="true">' +
        '<img class="drum-card__logo" src="' +
        WHOOSH_LOGO_SRC +
        '" alt="" decoding="async" />' +
        "</div>" +
        '<div><div class="drum-card__big"></div><div class="drum-card__small"></div></div>';
      const img = row.querySelector(".drum-card__logo");
      img.addEventListener("error", function () { this.remove(); });
      row.querySelector(".drum-card__big").textContent = entry.big;
      row.querySelector(".drum-card__small").textContent = entry.small;
      return row;
    }

    function fillStripFromData(entries) {
      drumStrip.innerHTML = "";
      for (let i = 0; i < entries.length; i++) {
        drumStrip.appendChild(renderStripRow(entries[i]));
      }
    }

    function cancelSpinAnimation() {
      if (spinTimeoutId !== null) {
        clearTimeout(spinTimeoutId);
        spinTimeoutId = null;
      }
      if (spinRafId !== null) {
        cancelAnimationFrame(spinRafId);
        spinRafId = null;
      }
    }

    function easeCubicBezier(t, x1, y1, x2, y2) {
      if (t <= 0) return 0;
      if (t >= 1) return 1;
      let lo = 0;
      let hi = 1;
      for (let i = 0; i < 28; i++) {
        const u = (lo + hi) / 2;
        const bx =
          3 * (1 - u) * (1 - u) * u * x1 + 3 * (1 - u) * u * u * x2 + u * u * u;
        if (bx < t) lo = u;
        else hi = u;
      }
      const u = (lo + hi) / 2;
      return 3 * (1 - u) * (1 - u) * u * y1 + 3 * (1 - u) * u * u * y2 + u * u * u;
    }

    const easeSpin = function (t) {
      return easeCubicBezier(t, 0.2, 0, 0.3, 1);
    };

    const spinSound = new Audio("wheel-of-fortune.mp3");
    spinSound.preload = "auto";

    async function spin() {
      if (spinning || !sessionUser) return;
      const tid = getTelegramUserId();

      if (!isDemoAdmin()) {
        if (!sessionUser.free_spin_available && (Number(sessionUser.mileage) || 0) < KM_TARGET) {
          return;
        }
      }

      let reserve;
      try {
        const res = await fetch("/api/spin-reserve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ telegramId: tid }),
        });
        reserve = await res.json().catch(function () { return {}; });
        if (!res.ok) {
          showErr((reserve && reserve.error) || "\u041d\u0435\u0434\u043e\u0441\u0442\u0430\u0442\u043e\u0447\u043d\u043e \u043a\u043c");
          return;
        }
      } catch (e) {
        showErr("\u0421\u0435\u0442\u044c");
        return;
      }

      if (!isDemoAdmin()) {
        sessionUser.mileage = reserve.mileage;
        sessionUser.free_spin_available = reserve.free_spin_available;
      }
      refreshUi();

      cancelSpinAnimation();
      const won = pickWeightedPrize();
      const stripData = buildStrip(won);
      fillStripFromData(stripData);
      const viewH = drumViewport.getBoundingClientRect().height;
      const winIndex = stripData.length - 1;
      const yStart = translateForCenteredIndex(0, viewH);
      const yEnd = translateForCenteredIndex(winIndex, viewH);
      drumStrip.style.transform = "translateY(" + yStart + "px)";

      spinSound.pause();
      spinSound.currentTime = 0;
      spinSound.play().catch(function () {});

      spinBtn.classList.add("is-waiting");
      spinBtn.disabled = true;
      spinning = true;

      const SPIN_MS = 4500;
      const startTime = performance.now();

      function frame(now) {
        const elapsed = now - startTime;
        const t = Math.min(1, elapsed / SPIN_MS);
        const e = easeSpin(t);
        drumStrip.style.transform = "translateY(" + (yStart + (yEnd - yStart) * e) + "px)";
        if (t < 1) spinRafId = requestAnimationFrame(frame);
        else spinRafId = null;
      }
      spinRafId = requestAnimationFrame(frame);

      spinTimeoutId = setTimeout(function () {
        spinTimeoutId = null;
        cancelSpinAnimation();
        drumStrip.style.transform = "translateY(" + yEnd + "px)";
        spinSound.pause();
        currentPrizeText = won.title;
        currentIsPhysical = isPhysicalPrize(won);
        currentPromoCode = currentIsPhysical ? "" : promoForEntry(won);
        spinning = false;
        spinBtn.classList.remove("is-waiting");
        refreshUi();
        openPrizeModal();
      }, SPIN_MS);
    }

    function openPrizeModal() {
      modalPrize.textContent = currentPrizeText;
      if (currentIsPhysical) {
        modalPhysicalNotice.hidden = false;
        modalPhysicalNotice.textContent =
          "\u0414\u043b\u044f \u043f\u043e\u043b\u0443\u0447\u0435\u043d\u0438\u044f \u0441\u0432\u044f\u0436\u0438\u0442\u0435\u0441\u044c \u0441 \u043c\u0435\u043d\u0435\u0434\u0436\u0435\u0440\u043e\u043c.";
        contactTgBtn.hidden = false;
        modalPromoLabel.hidden = true;
        modalPromoCode.hidden = true;
        copyPromoBtn.hidden = true;
        modalPromoCode.textContent = "";
      } else {
        modalPhysicalNotice.hidden = true;
        contactTgBtn.hidden = true;
        modalPromoLabel.hidden = false;
        modalPromoCode.hidden = false;
        copyPromoBtn.hidden = false;
        modalPromoCode.textContent = currentPromoCode;
        copyPromoBtn.textContent = LABEL_COPY_PROMO;
      }
      claimBtn.textContent = LABEL_CLAIM;
      claimBtn.disabled = false;
      prizeOverlay.classList.add("is-open");
    }

    function closePrizeModal() {
      prizeOverlay.classList.remove("is-open");
      refreshUi();
    }

    contactTgBtn.addEventListener("click", function (e) {
      e.preventDefault();
      const url = PHYSICAL_PRIZE_CHAT_URL;
      if (tg && typeof tg.openTelegramLink === "function") tg.openTelegramLink(url);
      else window.open(url, "_blank", "noopener,noreferrer");
    });

    copyPromoBtn.addEventListener("click", async function () {
      if (copyPromoBtn.hidden) return;
      const text = currentPromoCode || modalPromoCode.textContent || "";
      if (!text) return;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const ta = document.createElement("textarea");
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        }
        copyPromoBtn.textContent = LABEL_COPIED;
        setTimeout(function () {
          if (prizeOverlay.classList.contains("is-open")) {
            copyPromoBtn.textContent = LABEL_COPY_PROMO;
          }
        }, 2000);
      } catch (e) {
        showErr("\u041a\u043e\u043f\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u043d\u0435 \u0443\u0434\u0430\u043b\u043e\u0441\u044c");
      }
    });

    claimBtn.addEventListener("click", async function () {
      if (claimBtn.disabled) return;
      claimBtn.disabled = true;
      try {
        const res = await fetch("/api/send-prize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) || "\u0413\u043e\u0441\u0442\u044c",
            prize: currentPrizeText,
            promoCode: currentIsPhysical ? "" : currentPromoCode,
            userId: getTelegramUserId(),
          }),
        });
        const data = await res.json().catch(function () { return {}; });
        if (!res.ok || !data.success) {
          showErr((data && data.error) || "\u041e\u0448\u0438\u0431\u043a\u0430");
          claimBtn.disabled = false;
          return;
        }
        claimBtn.textContent = "\u041e\u0442\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u043e";
        closePrizeModal();
        if (tg && typeof tg.showAlert === "function") {
          tg.showAlert("\u041f\u0440\u0438\u0437 \u043e\u0442\u043f\u0440\u0430\u0432\u043b\u0435\u043d!");
        }
      } catch (e) {
        claimBtn.disabled = false;
        showErr("\u0421\u0435\u0442\u044c");
      }
    });

    closeModalBtn.addEventListener("click", closePrizeModal);
    spinBtn.addEventListener("click", spin);

    phoneInput.addEventListener("input", function () {
      let v = phoneInput.value.replace(/\D/g, "");
      if (v.startsWith("8")) v = "7" + v.slice(1);
      if (v.startsWith("7") && v.length > 1) {
        phoneInput.value = "+" + v;
      } else if (v.length > 0) {
        phoneInput.value = "+" + v;
      }
    });

    authEnterBtn.addEventListener("click", async function () {
      const raw = phoneInput.value.replace(/\D/g, "");
      if (raw.length < 10) {
        showErr("\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043a\u043e\u0440\u0440\u0435\u043a\u0442\u043d\u044b\u0439 \u043d\u043e\u043c\u0435\u0440");
        return;
      }
      authEnterBtn.disabled = true;
      showBootLoading(true);
      const start = Date.now();
      try {
        const response = await fetch("/api/save-user", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id:
              window.Telegram?.WebApp?.initDataUnsafe?.user?.id != null
                ? window.Telegram.WebApp.initDataUnsafe.user.id
                : getTelegramUserId(),
            phone: phoneInput.value,
          }),
        });
        const data = await response.json().catch(function () {
          return {};
        });
        if (!response.ok) {
          showBootLoading(false);
          authEnterBtn.disabled = false;
          const errText =
            "\u041e\u0448\u0438\u0431\u043a\u0430 \u0441\u0435\u0440\u0432\u0435\u0440\u0430: " +
            (data.error || "\u041d\u0435\u0438\u0437\u0432\u0435\u0441\u0442\u043d\u043e");
          if (
            window.Telegram &&
            window.Telegram.WebApp &&
            typeof window.Telegram.WebApp.showAlert === "function"
          ) {
            window.Telegram.WebApp.showAlert(errText);
          } else {
            alert(errText);
          }
          return;
        }
        sessionUser = {
          mileage: data.mileage,
          free_spin_available: !data.first_spin_done,
        };
      } catch (e) {
        showBootLoading(false);
        authEnterBtn.disabled = false;
        const netMsg =
          "\u041e\u0448\u0438\u0431\u043a\u0430 \u0441\u0435\u0440\u0432\u0435\u0440\u0430: " +
          (e && e.message ? e.message : "\u0441\u0435\u0442\u044c");
        if (
          window.Telegram &&
          window.Telegram.WebApp &&
          typeof window.Telegram.WebApp.showAlert === "function"
        ) {
          window.Telegram.WebApp.showAlert(netMsg);
        } else {
          alert(netMsg);
        }
        return;
      }
      const elapsed = Date.now() - start;
      if (elapsed < 3000) {
        await new Promise(function (r) { setTimeout(r, 3000 - elapsed); });
      }
      showBootLoading(false);
      authEnterBtn.disabled = false;
      showMainOnly();
      refreshUi();
    });

    window.addEventListener("resize", function () {
      if (!spinning && drumStrip.children.length) {
        const viewH = drumViewport.getBoundingClientRect().height;
        const winIndex = drumStrip.children.length - 1;
        drumStrip.style.transform = "translateY(" + translateForCenteredIndex(winIndex, viewH) + "px)";
      }
    });

    (async function boot() {
      const tid = getTelegramUserId();
      if (tid == null) {
        showErr("\u041e\u0442\u043a\u0440\u043e\u0439\u0442\u0435 \u0432 Telegram \u0438\u043b\u0438 ?telegramId=");
        showAuthOnly();
        return;
      }
      try {
        const me = await apiMe();
        if (!me) {
          showAuthOnly();
          return;
        }
        sessionUser = me;
        showMainOnly();
        refreshUi();
      } catch (e) {
        showErr("\u041d\u0435 \u0443\u0434\u0430\u043b\u043e\u0441\u044c \u0437\u0430\u0433\u0440\u0443\u0437\u0438\u0442\u044c \u0434\u0430\u043d\u043d\u044b\u0435");
        showAuthOnly();
      }
    })();
  </script>
</body>
</html>
